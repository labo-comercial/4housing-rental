/* ================= COBRANZAS ================= */
const COB_ESTADOS = ['pendiente','parcial','cobrado'];
const COB_ESTADO_LBL = { pendiente:'Pendiente', parcial:'Parcial', cobrado:'Cobrado' };
// Tipos de gestión de cobranza (bitácora)
const GST_TIPOS = ['reclamo','factura_enviada','mail_proveedores','promesa_pago','nota','otro'];
const GST_TIPO_LBL = {
  reclamo:'Reclamo', factura_enviada:'Factura enviada', mail_proveedores:'Mail a pago a proveedores',
  promesa_pago:'Promesa de pago', nota:'Nota', otro:'Otro'
};
let cobFiltroEstado = '';
let cobSearch = '';
let cobFiltroTramo = '';   // '' | aldia | t1_30 | t31_60 | t61_90 | t90mas
let cobFiltroMoneda = '';  // '' | USD | ARS
let cobFiltroUnidad = '';  // '' | rental | ventas
let cobFiltroVenc   = '';  // '' | porcobrar | vencido | porvencer  (desde KPIs de estado de cuenta)
const COB_UNIDAD_LBL = { rental:'Rental', ventas:'Ventas', ambas:'Ambas' };
// Normaliza la unidad de negocio de una cobranza a 'rental' | 'ventas'
function cobUnidad(c){ return (c.unidad==='ventas')?'ventas':(c.unidad==='ambas'?'ambas':'rental'); }
// Normaliza la moneda a 'ARS' | 'USD'. Tolera minúsculas, espacios, símbolos ($/u$s).
function cobMoneda(c){
  const m = String((c&&c.moneda)||'').trim().toUpperCase();
  if(m==='ARS' || m==='$' || m==='PESOS' || m==='AR$') return 'ARS';
  return 'USD';
}
// Símbolo de moneda ya normalizada ('ARS'->'$', 'USD'->'USD')
function monedaSym(m){ return m==='ARS' ? '$' : 'USD'; }
// Símbolo a partir de una cobranza
function cobSym(c){ return monedaSym(cobMoneda(c)); }

// Suma de adicionales de una cobranza
function cobAdicionales(cobId){ return DB.adicionales.filter(a=>a.cobranzaId===cobId).reduce((s,a)=>s+(a.monto||0),0); }
// Total efectivo a cobrar = monto base (de la cotización) + adicionales
function cobTotal(c){ return (c.montoBase||0) + cobAdicionales(c.id); }
// Suma de pagos de una cobranza
function cobPagado(cobId){ return DB.pagos.filter(p=>p.cobranzaId===cobId).reduce((a,p)=>a+(p.monto||0),0); }
// Saldo pendiente = total - pagado
function cobSaldo(c){ return Math.max(0, cobTotal(c) - cobPagado(c.id)); }
// Estado calculado a partir de pagos vs total efectivo
function cobEstadoCalc(c){
  const pag = cobPagado(c.id);
  const tot = cobTotal(c);
  if(pag<=0) return 'pendiente';
  if(pag < tot) return 'parcial';
  return 'cobrado';
}

// --- Ageing: días transcurridos desde la fecha de emisión de la factura ---
// Nota: la fecha de factura es un dato de gestión que se copia del ERP (fuente fiscal).
const AGEING_TRAMOS = [
  {key:'aldia',   lbl:'Al día',    min:-99999, max:0},
  {key:'t1_30',   lbl:'1-30',      min:1,      max:30},
  {key:'t31_60',  lbl:'31-60',     min:31,     max:60},
  {key:'t61_90',  lbl:'61-90',     min:61,     max:90},
  {key:'t90mas',  lbl:'+90',       min:91,     max:99999},
];
// Días vencidos desde la emisión de factura. null si no hay fecha cargada.
function cobDiasVencido(c){
  if(!c.facturaFecha) return null;
  const emis = new Date(c.facturaFecha+'T00:00:00').getTime();
  if(isNaN(emis)) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  return Math.floor((hoy.getTime()-emis)/86400000);
}
// Tramo de ageing al que pertenece (solo si tiene saldo pendiente y fecha de factura)
function cobTramo(c){
  const d = cobDiasVencido(c);
  if(d==null) return null;
  return AGEING_TRAMOS.find(t=> d>=t.min && d<=t.max) || null;
}
// Color de semáforo según ageing
function cobSemaforo(c){
  const d = cobDiasVencido(c);
  if(d==null) return 'sinfecha';
  if(d<=0)  return 'verde';
  if(d<=30) return 'amarillo';
  return 'rojo';
}
// Clasifica el saldo pendiente: 'vencido' | 'porvencer' | null (sin saldo)
function cobClaseVenc(c){
  const saldo = cobSaldo(c);
  if(saldo<=0) return null;
  const d = cobDiasVencido(c);
  if(d!=null && d>0) return 'vencido';
  return 'porvencer';
}
// Objetivo de cobro del mes: 95% del MONTO de las facturas que vencen en el mes en curso,
// por moneda. "Vence en el mes" = fecha de emisión dentro del mes actual (la fecha de factura
// es la base de ageing/vencimiento que maneja Cobranzas). Devuelve {USD:{obj,cobrado}, ARS:{...}}.
function objetivoCobroMes(){
  const ini = new Date(); ini.setDate(1); ini.setHours(0,0,0,0);
  const fin = new Date(ini); fin.setMonth(fin.getMonth()+1); // primer día del mes siguiente
  const res = { USD:{base:0,obj:0,cobrado:0}, ARS:{base:0,obj:0,cobrado:0} };
  DB.cobranzas.forEach(c=>{
    const m = cobMoneda(c);
    // facturas que vencen este mes (por fecha de emisión cargada)
    if(c.facturaFecha){
      const f = new Date(c.facturaFecha+'T00:00:00').getTime();
      if(f>=ini.getTime() && f<fin.getTime()) res[m].base += cobTotal(c);
    }
  });
  // cobrado en el mes (pagos con fecha dentro del mes), por moneda
  DB.cobranzas.forEach(c=>{
    const m = cobMoneda(c);
    DB.pagos.filter(p=>p.cobranzaId===c.id).forEach(p=>{
      if(p.fecha){ const pf=new Date(p.fecha+'T00:00:00').getTime(); if(pf>=ini.getTime() && pf<fin.getTime()) res[m].cobrado += (p.monto||0); }
    });
  });
  res.USD.obj = res.USD.base*0.95;
  res.ARS.obj = res.ARS.base*0.95;
  return res;
}
// Gestiones de una cobranza, más recientes primero
function cobGestiones(cobId){ return DB.gestiones.filter(g=>g.cobranzaId===cobId).sort((a,b)=> (b.fecha||'').localeCompare(a.fecha||'') || b.created-a.created); }

// --- Gráficos SVG ---
// Dona de composición del saldo: por vencer (verde) + vencido (rojo). El centro muestra el total por cobrar.
function donaSaldoSVG(sym, porvencer, vencido){
  const total = porvencer + vencido;
  const R=52, r=34, cx=64, cy=64;
  if(total<=0){
    return `<svg viewBox="0 0 128 128" width="128" height="128" role="img">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#e7e3d6" stroke-width="${R-r}"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#8a8576">sin saldo</text>
    </svg>`;
  }
  const segs = [
    {val:porvencer, col:'#4f8a53'},
    {val:vencido,   col:'#b0584f'},
  ];
  const C = 2*Math.PI*R;
  let offset=0;
  const arcs = segs.filter(s=>s.val>0).map(s=>{
    const len = C*(s.val/total);
    const dash = `${len} ${C-len}`;
    const el = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${s.col}" stroke-width="${R-r}" stroke-dasharray="${dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += len;
    return el;
  }).join('');
  return `<svg viewBox="0 0 128 128" width="128" height="128" role="img">
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#eee9dc" stroke-width="${R-r}"/>
    ${arcs}
    <text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="8.5" fill="#8a8576">Por cobrar</text>
    <text x="${cx}" y="${cy+9}" text-anchor="middle" font-size="12" font-weight="700" fill="#37432c">${sym} ${fmt(total)}</text>
  </svg>`;
}
// Barra de cobrado del mes vs objetivo (95%). Roja si está por debajo, verde si lo alcanza/supera.
function barraObjetivoSVG(sym, cobrado, objetivo){
  const W=240, H=26;
  const alcanzado = objetivo>0 && cobrado>=objetivo;
  const col = alcanzado ? '#4f8a53' : '#b0584f';
  // ancho de la barra de cobrado proporcional al máximo(obj, cobrado) para que siempre se vea
  const max = Math.max(objetivo, cobrado, 1);
  const wCob = Math.round(W*(cobrado/max));
  const xObj = Math.round(W*(objetivo/max));
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" role="img">
    <rect x="0" y="4" width="${W}" height="${H-8}" rx="4" fill="#eee9dc"/>
    <rect x="0" y="4" width="${wCob}" height="${H-8}" rx="4" fill="${col}"/>
    ${objetivo>0?`<line x1="${xObj}" y1="0" x2="${xObj}" y2="${H}" stroke="#37432c" stroke-width="2" stroke-dasharray="3 2"/>`:''}
  </svg>`;
}

VIEWS.cobranzas = function(){
  setHeader('Cobranzas','Seguimiento de alquileres y ventas ganados, estados de cuenta e indicadores');

  let list = [...DB.cobranzas];
  if(cobSearch){
    const q = cobSearch.toLowerCase();
    list = list.filter(c => (`${c.ref} ${c.razonSocial} ${c.cuit} ${c.facturaNro}`).toLowerCase().includes(q));
  }
  if(cobFiltroEstado) list = list.filter(c => cobEstadoCalc(c)===cobFiltroEstado);
  if(cobFiltroMoneda) list = list.filter(c => cobMoneda(c)===cobFiltroMoneda);
  if(cobFiltroUnidad) list = list.filter(c => cobUnidad(c)===cobFiltroUnidad || cobUnidad(c)==='ambas');
  if(cobFiltroVenc)   list = list.filter(c => cobClaseVenc(c)===cobFiltroVenc);
  if(cobFiltroTramo)  list = list.filter(c => { const t=cobTramo(c); return t && t.key===cobFiltroTramo && cobSaldo(c)>0; });
  // Orden: más vencido primero (prioridad de gestión), las sin fecha al final
  list.sort((a,b)=>{
    const da=cobDiasVencido(a), db=cobDiasVencido(b);
    if(da==null && db==null) return b.created-a.created;
    if(da==null) return 1;
    if(db==null) return -1;
    return db-da;
  });

  // Estado de cuenta + KPIs de cabecera, separados por moneda.
  // Respeta el filtro de unidad de negocio si está activo.
  const enUnidad = c => !cobFiltroUnidad || cobUnidad(c)===cobFiltroUnidad || cobUnidad(c)==='ambas';
  const monedas = ['USD','ARS'];
  const cuenta = {};
  monedas.forEach(m => cuenta[m] = { total:0, cobrado:0, pendiente:0, vencido:0, porvencer:0, cobradoMes:0, n:0 });
  // Inicio de mes para "cobrado en el mes"
  const inicioMes = new Date(); inicioMes.setDate(1); inicioMes.setHours(0,0,0,0);
  DB.cobranzas.filter(enUnidad).forEach(c=>{
    const m = cobMoneda(c);
    const saldo = cobSaldo(c);
    cuenta[m].total += cobTotal(c);
    cuenta[m].cobrado += cobPagado(c.id);
    cuenta[m].pendiente += saldo;
    cuenta[m].n++;
    if(saldo>0){
      const d = cobDiasVencido(c);
      if(d!=null && d>0) cuenta[m].vencido += saldo;
      else cuenta[m].porvencer += saldo;
    }
    // cobrado en el mes: pagos del mes en curso
    DB.pagos.filter(p=>p.cobranzaId===c.id).forEach(p=>{
      if(p.fecha){ const pf=new Date(p.fecha+'T00:00:00').getTime(); if(pf>=inicioMes.getTime()) cuenta[m].cobradoMes += (p.monto||0); }
    });
  });
  const sym = m => monedaSym(m);
  const objCobro = objetivoCobroMes();

  // Ageing por tramos (solo cobranzas con saldo y con fecha de factura), por moneda activa
  const monedaAgeing = cobFiltroMoneda || (cuenta.USD.n>=cuenta.ARS.n?'USD':'ARS');
  const ageing = {}; AGEING_TRAMOS.forEach(t=> ageing[t.key]={monto:0, n:0});
  let sinFecha = {monto:0, n:0};
  DB.cobranzas.filter(enUnidad).forEach(c=>{
    const m = cobMoneda(c);
    if(m!==monedaAgeing) return;
    const saldo = cobSaldo(c);
    if(saldo<=0) return;
    const t = cobTramo(c);
    if(!t){ sinFecha.monto+=saldo; sinFecha.n++; return; }
    ageing[t.key].monto += saldo; ageing[t.key].n++;
  });
  const maxAgeing = Math.max(1, ...AGEING_TRAMOS.map(t=>ageing[t.key].monto));
  const ageingBars = AGEING_TRAMOS.map(t=>{
    const a = ageing[t.key];
    const pct = Math.round(100*a.monto/maxAgeing);
    const activo = cobFiltroTramo===t.key;
    const col = t.key==='aldia'?'#4f8a53':(t.key==='t1_30'?'#b3853a':(t.key==='t31_60'?'#c2843a':'#b0584f'));
    return `<div class="age-row ${activo?'on':''}" onclick="toggleCobTramo('${t.key}')" title="Filtrar ${t.lbl}">
      <div class="age-lbl">${t.lbl}</div>
      <div class="age-track"><div class="age-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="age-val">${sym(monedaAgeing)} ${fmt(a.monto)}<span class="age-n">(${a.n})</span></div>
    </div>`;
  }).join('');

  const cuentaCards = monedas.filter(m=>cuenta[m].n>0).map(m=>{
    const oc = objCobro[m] || {base:0,obj:0,cobrado:0};
    const alcanzado = oc.obj>0 && oc.cobrado>=oc.obj;
    const pctObj = oc.obj>0 ? Math.round(100*oc.cobrado/oc.obj) : 0;
    const kpi = (key, lbl, val, col) => {
      const activo = cobFiltroVenc===key;
      return `<div class="cob-kpi ${activo?'on':''}" onclick="toggleCobVenc('${key}')" title="Filtrar ${lbl}">
        <div class="help">${lbl}</div>
        <div style="font-size:18px;font-weight:700;color:${col}">${sym(m)} ${fmt(val)}</div>
      </div>`;
    };
    return `<div class="card cuenta-card"><div class="card-b">
      <div style="font-size:13px;font-weight:700;color:#37432c;margin-bottom:12px">Estado de cuenta · ${m}</div>
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <div style="flex:0 0 auto">${donaSaldoSVG(sym(m), cuenta[m].porvencer, cuenta[m].vencido)}</div>
        <div style="flex:1 1 140px;display:flex;flex-direction:column;gap:8px">
          ${kpi('porcobrar','Por cobrar', cuenta[m].pendiente, '#b3853a')}
          ${kpi('vencido','Vencido', cuenta[m].vencido, '#b0584f')}
          ${kpi('porvencer','Por vencer', cuenta[m].porvencer, '#4f8a53')}
        </div>
      </div>
      <div style="margin-top:16px;border-top:1px solid var(--line);padding-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
          <div class="help">Cobrado en el mes vs objetivo</div>
          <div style="font-size:12px;font-weight:700;color:${alcanzado?'#4f8a53':'#b0584f'}">${pctObj}%</div>
        </div>
        ${barraObjetivoSVG(sym(m), oc.cobrado, oc.obj)}
        <div style="display:flex;justify-content:space-between;margin-top:6px">
          <span style="font-size:12px;color:#37432c">Cobrado: <strong>${sym(m)} ${fmt(oc.cobrado)}</strong></span>
          <span style="font-size:12px;color:var(--muted)">Objetivo (95%): <strong>${sym(m)} ${fmt(oc.obj)}</strong></span>
        </div>
      </div>
    </div></div>`;
  }).join('');

  const estadoFiltroOpts = `<option value="">Todos los estados</option>`+
    COB_ESTADOS.map(s=>`<option value="${s}" ${s===cobFiltroEstado?'selected':''}>${COB_ESTADO_LBL[s]}</option>`).join('');
  const monedaFiltroOpts = `<option value="">Todas las monedas</option>`+
    ['USD','ARS'].map(m=>`<option value="${m}" ${m===cobFiltroMoneda?'selected':''}>${m}</option>`).join('');
  const unidadFiltroOpts = `<option value="">Todas las unidades</option>`+
    [['rental','Rental'],['ventas','Ventas']].map(([v,l])=>`<option value="${v}" ${v===cobFiltroUnidad?'selected':''}>${l}</option>`).join('');
  const hayFiltro = cobFiltroTramo||cobFiltroEstado||cobFiltroMoneda||cobFiltroUnidad||cobFiltroVenc;

  const nCuentas = monedas.filter(m=>cuenta[m].n>0).length;
  const cuentaGridCols = nCuentas>=2 ? 'repeat(2, minmax(0,1fr))' : 'minmax(0, 480px)';

  C().innerHTML = `
    <div style="display:grid;grid-template-columns:${cuentaGridCols};gap:16px;margin-bottom:16px;align-items:start">
      ${cuentaCards || '<div class="help">Todavía no hay ventas ganadas en cobranzas.</div>'}
    </div>
    ${DB.cobranzas.length ? `<div class="card" style="margin-bottom:16px"><div class="card-b">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap">
        <div style="font-size:13px;font-weight:700;color:#37432c">Ageing de saldos · ${monedaAgeing}${cobFiltroUnidad?` · ${COB_UNIDAD_LBL[cobFiltroUnidad]}`:''} <span class="help" style="font-weight:400">· días desde emisión de factura · tocá para filtrar</span></div>
        ${cobFiltroTramo?`<button class="btn ghost sm" onclick="toggleCobTramo('${cobFiltroTramo}')">Quitar filtro de tramo</button>`:''}
      </div>
      <div class="age-chart">${ageingBars}</div>
      ${sinFecha.n?`<div class="help" style="margin-top:10px">${sinFecha.n} cobranza(s) con saldo sin fecha de factura cargada (${sym(monedaAgeing)} ${fmt(sinFecha.monto)}) — no entran al ageing.</div>`:''}
    </div></div>` : ''}
    <div class="opp-filters">
      <input id="cobSearch" class="inp" style="max-width:240px" placeholder="Buscar ref, cliente, CUIT, factura…" value="${esc(cobSearch)}">
      <select id="cobUnidad">${unidadFiltroOpts}</select>
      <select id="cobEstado">${estadoFiltroOpts}</select>
      <select id="cobMoneda">${monedaFiltroOpts}</select>
      ${hayFiltro?`<button class="btn ghost sm" onclick="limpiarCobFiltros()">Limpiar filtros</button>`:''}
      <span class="help" style="margin-left:auto">${list.length} ${list.length===1?'cobranza':'cobranzas'}</span>
    </div>
    <div class="card"><div class="card-b" style="padding:0">
      ${list.length ? `<table class="grid">
        <thead><tr>
          <th></th><th>Ref.</th><th>Cliente</th><th>Unidad</th><th>Factura</th><th class="c">Días</th>
          <th class="r">Total</th><th class="r">Saldo</th><th>Estado</th>
        </tr></thead>
        <tbody>${list.map(rowCobranza).join('')}</tbody></table>`
      : `<div class="empty" style="padding:40px">No hay cobranzas con este filtro. Las ventas llegan automáticamente al ganar una venta.</div>`}
    </div></div>`;

  const s=document.getElementById('cobSearch');
  s.oninput=()=>{ cobSearch=s.value; const p=s.selectionStart; VIEWS.cobranzas(); const n=document.getElementById('cobSearch'); n.focus(); n.setSelectionRange(p,p); };
  document.getElementById('cobUnidad').onchange=ev=>{ cobFiltroUnidad=ev.target.value; VIEWS.cobranzas(); };
  document.getElementById('cobEstado').onchange=ev=>{ cobFiltroEstado=ev.target.value; VIEWS.cobranzas(); };
  document.getElementById('cobMoneda').onchange=ev=>{ cobFiltroMoneda=ev.target.value; VIEWS.cobranzas(); };
  C().querySelectorAll('tr.clickable').forEach(tr=> tr.onclick=()=> openCobranza(tr.dataset.id));
};
function toggleCobTramo(k){ cobFiltroTramo = (cobFiltroTramo===k)?'':k; VIEWS.cobranzas(); }
function toggleCobVenc(k){ cobFiltroVenc = (cobFiltroVenc===k)?'':k; VIEWS.cobranzas(); }
function limpiarCobFiltros(){ cobFiltroTramo=''; cobFiltroEstado=''; cobFiltroMoneda=''; cobFiltroUnidad=''; cobFiltroVenc=''; VIEWS.cobranzas(); }
window.toggleCobTramo = toggleCobTramo; window.toggleCobVenc = toggleCobVenc; window.limpiarCobFiltros = limpiarCobFiltros;

function rowCobranza(c){
  const sym = cobSym(c);
  const saldo = cobSaldo(c);
  const est = cobEstadoCalc(c);
  const d = cobDiasVencido(c);
  const sem = cobSemaforo(c);
  const diasTxt = d==null ? '<span class="help">s/factura</span>' : (d<=0 ? 'al día' : `${d}d`);
  const facturaTxt = c.facturaNro
    ? `${esc(c.facturaNro)}${c.facturaFecha?`<br><span class="help">${new Date(c.facturaFecha+'T00:00:00').toLocaleDateString('es-AR')}</span>`:''}`
    : '<span class="help">—</span>';
  return `<tr class="clickable" data-id="${c.id}">
    <td><span class="sem sem-${sem}" title="${sem}"></span></td>
    <td><strong>${esc(c.ref||'—')}</strong></td>
    <td>${esc(upperName(c.razonSocial)||'—')}<br><span class="help">${esc(c.cuit||'')}</span></td>
    <td><span class="badge un-${cobUnidad(c)}">${COB_UNIDAD_LBL[cobUnidad(c)]||cobUnidad(c)}</span></td>
    <td style="font-size:12px">${facturaTxt}</td>
    <td class="c" style="font-weight:600;color:${sem==='rojo'?'#b0584f':(sem==='amarillo'?'#b3853a':'#37432c')}">${diasTxt}</td>
    <td class="r">${sym} ${fmt(cobTotal(c))}</td>
    <td class="r" style="color:${saldo>0?'#b3853a':'#4f8a53'};font-weight:700">${sym} ${fmt(saldo)}</td>
    <td><span class="badge cob-${est}">${COB_ESTADO_LBL[est]}</span></td>
  </tr>`;
}

function openCobranza(id){
  const c = DB.cobranzas.find(x=>x.id===id); if(!c) return;
  const sym = cobSym(c);
  const pagos = DB.pagos.filter(p=>p.cobranzaId===id).sort((a,b)=> (b.fecha||'').localeCompare(a.fecha||''));
  const adics = DB.adicionales.filter(a=>a.cobranzaId===id).sort((a,b)=> a.created-b.created);
  const gestiones = cobGestiones(id);
  const pag = cobPagado(id);
  const total = cobTotal(c);
  const saldo = cobSaldo(c);
  const est = cobEstadoCalc(c);

  // Forma de pago como líneas concepto + monto
  const fpLineas = (c.formaPago && c.formaPago.length)
    ? c.formaPago.map(l=>`<div style="display:flex;justify-content:space-between;gap:12px;padding:3px 0;border-bottom:1px dashed var(--line)">
         <span style="color:#37432c">${esc(l.concepto||'—')}</span>
         <span style="font-weight:600;color:#37432c;white-space:nowrap">${l.monto!=null?(sym+' '+fmt(l.monto)):'—'}</span>
       </div>`).join('')
    : '<div class="help">Sin desglose de forma de pago. Usá "Editar datos" para cargarlo.</div>';

  const adicLineas = adics.length
    ? adics.map(a=>`<div class="opp-act-item" style="display:flex;justify-content:space-between;align-items:center">
         <div><strong>${sym} ${fmt(a.monto)}</strong> · ${esc(a.descripcion||'—')}</div>
         <button class="btn ghost sm" style="color:#b0584f" onclick="delAdicional('${a.id}','${id}')">Quitar</button>
       </div>`).join('')
    : '<div class="help">Sin adicionales. Usá "Agregar adicional" para sumar conceptos posteriores a la venta.</div>';

      <div class="fld"><label>CUIT</label><div class="val">${esc(c.cuit||'—')}</div></div>

      <div class="fld"><label>Adicionales</label><div class="val">${sym} ${fmt(cobAdicionales(id))}</div></div>
      <div class="fld"><label>Total a cobrar</label><div class="val" style="font-weight:700">${sym} ${fmt(total)}</div></div>
      <div class="fld"><label>Cobrado</label><div class="val" style="color:#4f8a53">${sym} ${fmt(pag)}</div></div>

      <div class="fld"><label>Factura (ERP)</label><div class="val">${c.facturaNro?esc(c.facturaNro):'<span class="help">— sin cargar —</span>'}</div></div>
      <div class="fld"><label>Emisión / Ageing</label><div class="val">${c.facturaFecha?`${new Date(c.facturaFecha+'T00:00:00').toLocaleDateString('es-AR')} · <span style="color:${cobSemaforo(c)==='rojo'?'#b0584f':(cobSemaforo(c)==='amarillo'?'#b3853a':'#4f8a53')};font-weight:600">${(()=>{const d=cobDiasVencido(c);return d<=0?'al día':d+' días';})()}</span>`:'<span class="help">cargá la fecha para ageing</span>'}</div></div>

  FP_LINES = (c.formaPago && c.formaPago.length) ? c.formaPago.map(l=>({concepto:l.concepto||'', monto:l.monto!=null?l.monto:''})) : [];

      <div class="fld"><label>Fecha de emisión <span class="help" style="font-weight:400">(para ageing)</span></label><input id="cobFactFecha" class="inp" type="date" value="${esc(c.facturaFecha||'')}"></div>
    </div>
    <div class="fld" style="margin-top:12px">

        <button type="button" class="btn ghost sm" onclick="addFPLine()">${ICO.plus} Agregar línea</button>

    </div>`,
    `<button class="btn ghost" onclick="openCobranza('${id}')">Volver</button><button class="btn" onclick="saveCobranza('${id}')">Guardar</button>`);

let FP_LINES = [];
function renderFPLines(){
  const el = document.getElementById('fpList'); if(!el) return;
  if(!FP_LINES.length){
    el.innerHTML = `<div class="help" style="padding:4px 0">Sin líneas. Agregá los conceptos (ej: "Anticipo 40%" / 4000, "Saldo contra entrega" / 6000).</div>`;
    return;
  }
  el.innerHTML = FP_LINES.map((l,i)=>`
    <div class="frow c2" style="margin-top:8px;align-items:end">
      <div class="field" style="margin:0"><label>Concepto</label><input class="fpc" data-i="${i}" data-k="concepto" value="${esc(l.concepto)}" placeholder="Anticipo 40%"></div>
      <div class="field" style="margin:0;max-width:160px"><label>Monto</label><input class="fpc" data-i="${i}" data-k="monto" value="${esc(String(l.monto??''))}" placeholder="0"></div>
      <button type="button" class="btn ghost sm" style="color:#b0584f;margin-bottom:2px" onclick="delFPLine(${i})">×</button>
    </div>`).join('');
  el.querySelectorAll('.fpc').forEach(inp=>{
    inp.oninput = e=>{ const i=+e.target.dataset.i, k=e.target.dataset.k; FP_LINES[i][k]=e.target.value; };
  });
}
function addFPLine(){ FP_LINES.push({concepto:'', monto:''}); renderFPLines(); }
function delFPLine(i){ FP_LINES.splice(i,1); renderFPLines(); }
async function saveCobranza(id){
  try{
    const fp = FP_LINES
      .map(l=>({concepto:(l.concepto||'').trim(), monto:(l.monto===''||l.monto==null)?null:num(l.monto)}))
      .filter(l=>l.concepto||l.monto!=null);
    await SB.updateCobranza(id, {
      razon_social: document.getElementById('cobRazon').value.trim()||null,
      cuit: document.getElementById('cobCuit').value.trim()||null,
      monto_total: num(document.getElementById('cobMonto').value),
      moneda: document.getElementById('cobMonedaEd').value,
      unidad_negocio: document.getElementById('cobUnidadEd').value,

      factura_nro: document.getElementById('cobFactNro').value.trim()||null,
      factura_fecha: document.getElementById('cobFactFecha').value||null
    });

}

  try{

      notas: document.getElementById('pagNotas').value.trim()||null

  }catch(e){ toast('Error: '+e.message); }

}
// Recalcula y persiste el estado (pendiente/parcial/cobrado) según pagos vs total efectivo.
// Asume que DB ya fue recargado.
async function recalcEstadoCobranza(cobId){
  const c = DB.cobranzas.find(x=>x.id===cobId); if(!c) return;
  const pagado = cobPagado(cobId);
  const tot = cobTotal(c);
  const nuevoEstado = pagado<=0 ? 'pendiente' : (pagado < tot ? 'parcial' : 'cobrado');
  if(nuevoEstado !== c.estado) await SB.updateCobranza(cobId, {estado:nuevoEstado});
}

function printEstadoCuenta(id){
  const c = DB.cobranzas.find(x=>x.id===id); if(!c) return;
  const sym = cobSym(c);
  const pagos = DB.pagos.filter(p=>p.cobranzaId===id).sort((a,b)=> (a.fecha||'').localeCompare(b.fecha||''));
  const adics = DB.adicionales.filter(a=>a.cobranzaId===id).sort((a,b)=> a.created-b.created);
  const total = cobTotal(c), pag = cobPagado(id), saldo = cobSaldo(c);
  const est = cobEstadoCalc(c);
  const hoy = new Date().toLocaleDateString('es-AR');

  const fpRows = (c.formaPago && c.formaPago.length)
    ? c.formaPago.map(l=>`<tr><td class="it-detail">${esc(l.concepto||'—')}</td><td class="it-r">${l.monto!=null?(sym+' '+fmt(l.monto)):'—'}</td></tr>`).join('')
    : `<tr><td class="it-detail" colspan="2" style="color:#8a8578">Sin desglose de forma de pago.</td></tr>`;

  const adicRows = adics.length
    ? adics.map(a=>`<tr><td class="it-detail">${esc(a.descripcion||'—')}</td><td class="it-r">${sym} ${fmt(a.monto)}</td></tr>`).join('')

    : `<tr><td colspan="3" class="it-detail" style="color:#8a8578">Sin pagos registrados.</td></tr>`;

  const facturaTxt = c.facturaNro
    ? `${esc(c.facturaNro)}${c.facturaFecha?` · emitida ${new Date(c.facturaFecha+'T00:00:00').toLocaleDateString('es-AR')}`:''}`

  <div class="page edc-page">

      <div class="col-div head-doc">

      <div class="col-div head-tuv"><img src="${ISO_SEAL}" class="head-tuv-img" alt="ISO 9001 14001 45001 TÜV NORD"></div>
    </div>

    <div class="sec"><span class="num">01</span><span class="t">DATOS DEL CLIENTE</span><span class="ln"></span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;font-size:12.5px;margin:8px 2px 4px">
      <div><b>Cliente:</b> ${esc(upperName(c.razonSocial)||'—')}</div>
      <div><b>CUIT:</b> ${esc(c.cuit||'—')}</div>
      <div><b>Unidad:</b> ${COB_UNIDAD_LBL[cobUnidad(c)]||cobUnidad(c)}</div>
      <div><b>Moneda:</b> ${cobMoneda(c)}</div>
      <div style="grid-column:1/3"><b>Factura (ERP):</b> ${facturaTxt}</div>
    </div>

    <div class="sec"><span class="num">02</span><span class="t">DETALLE</span><span class="ln"></span></div>
    <table class="items no-plazo">
      <thead><tr><th>CONCEPTO</th><th class="r">IMPORTE</th></tr></thead>
      <tbody>
        <tr><td class="it-detail"><b>Monto base de la operación</b></td><td class="it-r">${sym} ${fmt(c.montoBase)}</td></tr>
        ${adicRows}
        <tr style="border-top:2px solid #37432c"><td class="it-detail"><b>TOTAL A COBRAR</b></td><td class="it-r"><b>${sym} ${fmt(total)}</b></td></tr>

    <table class="items no-plazo">
      <thead><tr><th>CONCEPTO</th><th class="r">IMPORTE</th></tr></thead>

        <div class="fi">${ICO.phone}<span>${esc(SETTINGS.tel)}</span></div>

  let layer = document.getElementById('edcPrintLayer');
  if(!layer){ layer=document.createElement('div'); layer.id='edcPrintLayer'; document.body.appendChild(layer); }
  layer.innerHTML = html;
  document.body.classList.add('printing-edc');
  const prevTitle = document.title;
  document.title = `EstadoDeCuenta-${(c.ref||'').replace(/[^\w-]/g,'')||'4housing'}-${todayISO()}`;
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{
      document.body.classList.remove('printing-edc');
      layer.innerHTML='';
      document.title = prevTitle;
    }, 400);
  }, 60);
}

function editQuote(id){
  CUR = JSON.parse(JSON.stringify(DB.quotes.find(x=>x.id===id)));
  if(!CUR.dateISO) CUR.dateISO = todayISO(); // compat. cotizaciones previas
  if(!CUR.version) CUR.version = parseVer(CUR.ref);
  if(!CUR.unidad) CUR.unidad = 'rental'; // compat. cotizaciones previas
  renderEditor(false);
}
async function newVersion(id){
  const base = DB.quotes.find(x=>x.id===id);
  if(!base) return;
  if(!base.seq){ toast('Guardá la cotización original antes de versionar.'); return; }
  // Mayor versión existente para este número de oferta (misma línea)
  const maxVer = DB.quotes.filter(q=>q.seq===base.seq)
                          .reduce((m,q)=>Math.max(m, q.version||parseVer(q.ref)||1), 1);
  const nueva = JSON.parse(JSON.stringify(base));
  nueva.id = null;                       // registro nuevo en la base (uuid propio)
  nueva.seq = base.seq;                  // MISMO número/línea de referencia
  nueva.version = maxVer + 1;            // v2, v3, ...
  nueva.ref = refStr(nueva.seq, nueva.version, nueva.unidad);
  nueva.state = 'borrador';              // la nueva versión arranca como borrador
  nueva.dateISO = todayISO();            // fecha de la revisión
  nueva.created = Date.now();
  CUR = nueva;
  try{
    await saveQuote({silent:true, state:'borrador'});   // persiste y adopta uuid
    toast('Versión '+String(nueva.version).padStart(2,'0')+' creada');
    renderEditor(false);
  }catch(e){ /* el toast de error ya se mostró */ }
}

// Elimina la cotización abierta. Borra solo la VERSIÓN que se está viendo.
// Avisa y desvincula si está enlazada a una oportunidad o cobranza.
async function delQuote(id){
  const q = DB.quotes.find(x=>x.id===id);
  if(!q){ toast('La cotización aún no está guardada.'); return; }
  const totalVers = DB.quotes.filter(x=>x.seq===q.seq).length;
  const verLabel = 'VER '+String(q.version||parseVer(q.ref)||1).padStart(2,'0');
  const esUnica = totalVers<=1;

  // Vínculos: oportunidades que apuntan a esta cotización
  const oppsVinc = DB.opps.filter(o=>o.cotizacionId===id);

  let aviso = esUnica
    ? `¿Eliminar la cotización ${q.ref}? Es la única versión, así que se borra por completo.`
    : `¿Eliminar la versión ${verLabel} de la oferta ${refBase(q)}? Las otras ${totalVers-1} versión(es) se conservan.`;
  if(oppsVinc.length){
    aviso += `\n\nEstá vinculada a ${oppsVinc.length} oportunidad(es): se desvinculan (no se borran).`;
  }
  if(!confirm(aviso)) return;
  if(!confirm('Esta acción no se puede deshacer. ¿Confirmás?')) return;

  try{
    // Desvincular oportunidades que la referencian
    for(const o of oppsVinc){
      try{ await SB.updateOpp(o.id, {cotizacion_id:null}); }catch(_){}
    }
    await SB.delQuote(id);
    await reloadDB();
    toast(esUnica?'Cotización eliminada':'Versión eliminada');
    go('quotes');
  }catch(e){ toast('Error al eliminar: '+e.message); }
}

function fitPreview(){
  const wrap=document.querySelector('.prev-wrap'); const scale=document.getElementById('prevScale');
  if(!wrap||!scale) return;
  const pageW=794; // 210mm @96dpi approx
  const avail=wrap.clientWidth;
  const s=Math.min(1, avail/pageW);
  scale.style.transform=`scale(${s})`;
  const page=scale.querySelector('.page');
  if(page) scale.style.height=(page.offsetHeight*s)+'px';
}

/* ---- save / print ---- */
async function saveQuote(opts){
  opts = opts || {};
  try{
    CUR.client = document.getElementById('e_clientname') ? val('e_clientname').trim() : CUR.client;
    // Rental: el nombre del cliente se guarda SIEMPRE en mayúscula
    if(CUR.client) CUR.client = upperName(CUR.client);
    // Si el cliente escrito no existe en la base, crearlo y vincularlo
    if(CUR.client){
      const existeCliente = DB.clients.find(c=> c.name.trim().toLowerCase() === CUR.client.toLowerCase());
      if(existeCliente){
        CUR.clientId = existeCliente.id;
      } else {
        const nuevo = await SB.addClient(clientToRow({
          name:upperName(CUR.client), attn:CUR.attn||'', email:CUR.email||'', phone:CUR.phone||'', notes:''
        }));
        CUR.clientId = nuevo.id;
        await reloadDB(); // refresca el desplegable de clientes
      }
    }
    if(!CUR.id){
      // Cotización nueva: pedir número de oferta atómico a Supabase
      CUR.state = opts.state || 'borrador';
      if(!CUR.seq){
        CUR.seq = await SB.nextSeq(CUR.unidad);  // serie correlativa propia de la unidad
        CUR.ref = refStr(CUR.seq, CUR.version||1, CUR.unidad);
      }
      const row = await SB.addQuote(quoteToRow(CUR));
      CUR.id = row.id;                          // adoptar el uuid de Supabase
      // Si la cotización nace de una oportunidad de rental, vincularla:
      // la oportunidad conserva su número (OP-...) y queda enlazada a esta cotización.
      if(CUR.fromOppId){
        try{
          await SB.updateOpp(CUR.fromOppId, { cotizacion_id: CUR.id, estado: 'enviada' });
        }catch(_){ /* el vínculo es best-effort; la cotización ya se guardó */ }
      }
      await reloadDB();
    } else {
      if(opts.state) CUR.state = opts.state;
      await SB.updateQuote(CUR.id, quoteToRow(CUR));
      await reloadDB();
    }
    if(CUR.state==='ganada' && CUR.id){ await reloadDB(); await crearCobranzaDesdeQuote(CUR.id); }
    if(!opts.silent){ toast('Cotización guardada'); go(CUR.unidad==='ventas' ? 'ventas' : 'quotes'); }
  }catch(e){ toast('Error al guardar: '+e.message); throw e; }
}
function quoteTipologia(){
  // Deriva la "tipología de módulo" de los ítems. Si hay más de una, "Varios".
  const tipos = new Set();
  (CUR.items||[]).forEach(it=>{
    let t = (it.detail||'').trim();
    if(!t) return;
    // Limpieza: saca prefijos comerciales y deja el tipo de módulo
    t = t.replace(/^alquiler\s+/i,'')
         .replace(/\b\d+\s*mts?\.?\b/ig,'')   // medidas (6 mts.)
         .replace(/[.,;:\s]+$/,'')             // puntuación colgante final
         .replace(/\s{2,}/g,' ').trim();
    // descarta servicios que no son tipologías de módulo
    if(/traslado|instalaci[oó]n|flete/i.test(t)) return;
    if(t) tipos.add(t.toLowerCase());
  });
  if(tipos.size===0) return 'Modulo';
  if(tipos.size>1) return 'Varios';
  // Capitaliza la única tipología
  const u = [...tipos][0];
  return u.charAt(0).toUpperCase()+u.slice(1);
}
function sanitizeFile(s){
  return String(s||'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // saca acentos
    .replace(/[\/\\:*?"<>|]/g,' ')                    // chars inválidos
    .replace(/\s+/g,' ').trim();
}
function quoteFileName(){
  const base = refBase(CUR);              // OE-R-0001 / OE-V-4400
  const cli = sanitizeFile(CUR.client) || 'Cliente';
  const tip = sanitizeFile(quoteTipologia());
  return `${base}-${cli}-${tip}`;
}
async function printQuote(){
  // Al generar el PDF, la cotización queda registrada en el CRM como ENVIADA
  CUR.client = (document.getElementById('e_clientname') ? val('e_clientname').trim() : CUR.client) || CUR.client;
  CUR.state = 'enviada';
  try{
    await saveQuote({silent:true, state:'enviada'});  // asigna nº y persiste en Supabase
  }catch(e){ return; } // si falla el guardado, no imprime (ya avisó el toast)
  // refleja el cambio: nº de oferta y estado en el editor abierto
  renderEditor(false);
  const sel=document.getElementById('e_state'); if(sel) sel.value='enviada';
  toast('Cotización marcada como Enviada');
  const scale=document.getElementById('prevScale');
  const prev = scale? scale.style.transform : '';
  if(scale) scale.style.transform='none';
  const prevTitle = document.title;
  document.title = quoteFileName();
  setTimeout(()=>{
    window.print();
    if(scale) scale.style.transform=prev;
    setTimeout(()=>{ document.title = prevTitle; }, 500);
  }, 60);
}

/* ================= AUTENTICACIÓN — Supabase Auth + Azure ================= */
/* El login valida identidad (que seas de la organización 4housing22) vía Azure,
   pero ahora la sesión la maneja Supabase, así cada consulta viaja identificada. */
let AUTH_USER = null;

function authScreen(msg, btn){
  document.body.innerHTML = `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#eceae1;font-family:'Archivo',sans-serif;">
    <div style="background:#fff;border:1px solid #e2dfd4;border-radius:16px;padding:40px 38px;max-width:380px;text-align:center;box-shadow:0 14px 44px rgba(0,0,0,.10);">
      <div style="font-family:'Quicksand',sans-serif;font-weight:700;font-size:22px;color:#37432c;margin-bottom:6px;">4housing</div>
      <div style="font-size:13px;color:#94917f;margin-bottom:26px;">Cotizador & CRM</div>
      <div style="font-size:14px;color:#5f5c52;margin-bottom:22px;line-height:1.5;">${msg}</div>
      ${btn?`<button id="authBtn" style="background:#5f7a4e;color:#fff;border:none;border-radius:9px;padding:12px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">${btn}</button>`:''}
    </div>
  </div>`;
}

async function doLogin(){
  const { error } = await sbClient.auth.signInWithOAuth({
    provider: 'azure',
    options: {
      scopes: 'openid profile email',
      redirectTo: 'https://labo-comercial.github.io/4housing-comercial/'
    }
  });
  if(error){
    authScreen('No se pudo iniciar sesión.<br><span style="font-size:12px;color:#94917f">'+esc(error.message)+'</span>', 'Reintentar');
    setTimeout(()=>{ const b=document.getElementById('authBtn'); if(b) b.onclick=doLogin; }, 50);
  }
}

async function initAuth(){
  if(!window.supabase){
    // La librería no cargó (sin internet o CDN bloqueado)
    authScreen('No se pudo cargar el sistema de inicio de sesión. Verificá tu conexión a internet.', 'Reintentar');
    setTimeout(()=>{ const b=document.getElementById('authBtn'); if(b) b.onclick=()=>location.reload(); }, 50);
    return false;
  }
  // Al volver del login, Supabase deja la sesión disponible; esto la lee
  const { data: { session } } = await sbClient.auth.getSession();
  if(session && session.user){
    AUTH_USER = session.user;
    return true;
  }
  // No hay sesión: mostrar pantalla de login
  authScreen('Ingresá con tu cuenta de Microsoft de la organización para acceder.', 'Iniciar sesión con Microsoft');
  setTimeout(()=>{ const b=document.getElementById('authBtn'); if(b) b.onclick=doLogin; }, 50);
  return false;
}

(async function start(){
  const ok = await initAuth();
  if(!ok) return; // la pantalla de login ya se mostró
  // Mostrar usuario y cablear logout
  const lbl = document.getElementById('autosaveLbl');
  if(lbl && AUTH_USER) lbl.textContent = (AUTH_USER.user_metadata && (AUTH_USER.user_metadata.name || AUTH_USER.user_metadata.full_name)) || AUTH_USER.email || 'Conectado';
  const lo = document.getElementById('btnLogout');
  if(lo) lo.onclick = async()=>{
    await sbClient.auth.signOut();
    location.reload();
  };
  const c = document.getElementById('content');
  if(c) c.innerHTML = '<div class="empty">Cargando datos desde la nube…</div>';
  try{
    await reloadDB();
    go('dashboard');
  }catch(e){
    if(c) c.innerHTML = '<div class="empty"><div style="font-weight:600;color:#b4554e">No se pudo conectar con la base de datos</div>'
      + '<div style="margin-top:6px">'+esc(e.message)+'</div>'
      + '<div style="margin-top:10px"><button class="btn" onclick="location.reload()">Reintentar</button></div></div>';
  }
})();
