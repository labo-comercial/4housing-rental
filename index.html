<meta name="theme-color" content="#5f7a4e">

<style>
:root{
  --olive:#9db98b; --olive-deep:#5f7a4e; --olive-soft:#b8cdac; --olive-ink:#37432c;
  --cream:#f4f2ea; --paper:#ffffff; --ink:#2b2b26; --muted:#94917f;
  --line:#e2dfd4; --line-strong:#d3d0c4; --chip:#eceadf; --bg:#eceae1;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Archivo',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:var(--olive-deep);}

/* ---------- APP SHELL ---------- */
.app{display:flex;min-height:100vh;}
.side{width:230px;flex:none;background:#2f3a26;color:#e7ecdf;display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;}
.side .brand{display:flex;align-items:center;gap:8px;margin-bottom:26px;padding:0 6px;}
.side .brand img{height:30px;width:auto;display:block;filter:brightness(1.6);}
.side .brand-rental{color:#cdd6bf;font-family:'Quicksand',sans-serif;font-weight:600;font-size:17px;letter-spacing:.02em;line-height:30px;display:flex;align-items:center;}
.side nav{display:flex;flex-direction:column;gap:4px;}
.navbtn{display:flex;align-items:center;gap:11px;background:none;border:none;color:#cdd6bf;padding:11px 13px;border-radius:9px;font-size:14px;font-weight:600;text-align:left;letter-spacing:.01em;transition:.15s;}
.navbtn svg{width:19px;height:19px;flex:none;}
.navbtn:hover{background:rgba(255,255,255,.07);color:#fff;}
.navbtn.active{background:var(--olive);color:var(--olive-ink);}
.side .sp{flex:1;}
.side .data-actions{display:flex;flex-direction:column;gap:7px;border-top:1px solid rgba(255,255,255,.12);padding-top:16px;}
.side .data-actions .lbl{font-size:10px;letter-spacing:.16em;color:#9fb08c;font-weight:700;margin-bottom:2px;padding:0 4px;}
.minib{background:rgba(255,255,255,.08);border:none;color:#dfe7d3;padding:9px 11px;border-radius:8px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;}
.minib:hover{background:rgba(255,255,255,.16);}
.minib svg{width:15px;height:15px;}
.autosave{font-size:10px;color:#8fa07c;text-align:center;margin-top:8px;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:18px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.topbar h1{font-size:20px;font-weight:700;margin:0;letter-spacing:.01em;}
.topbar .sub{font-size:13px;color:var(--muted);margin-top:2px;}
.content{padding:26px 30px 60px;flex:1;}

/* ---------- BUTTONS ---------- */
.btn{background:var(--olive-deep);color:#fff;border:none;border-radius:9px;padding:11px 18px;font-size:13.5px;font-weight:600;letter-spacing:.02em;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1.1;min-height:42px;box-sizing:border-box;vertical-align:middle;}
.btn:hover{background:#536a44;}
.btn svg{width:16px;height:16px;}
.btn.ghost{background:#fff;color:var(--olive-deep);border:1px solid var(--line-strong);}
.btn.ghost:hover{background:var(--cream);}
.btn.sm{padding:8px 13px;font-size:12.5px;}
.btn.danger{background:#fff;color:#b4554e;border:1px solid #e8cfcc;}
.btn.danger:hover{background:#fbf0ef;}

/* ---------- CARDS / TABLES ---------- */
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:0;overflow:hidden;}
.card + .card{margin-top:20px;}
.card-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-h h3{margin:0;font-size:15px;font-weight:700;letter-spacing:.01em;}
.card-b{padding:18px 20px;}

table.grid{width:100%;border-collapse:collapse;font-size:13.5px;}
table.grid th{text-align:left;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:11px 16px;border-bottom:1px solid var(--line);background:#faf9f4;}
table.grid th.r,table.grid td.r{text-align:right;}
table.grid th.c,table.grid td.c{text-align:center;}
table.grid td{padding:14px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
table.grid tbody tr:last-child td{border-bottom:none;}
table.grid tbody tr.clickable:hover{background:#fbfaf3;cursor:pointer;}
.empty{padding:42px 20px;text-align:center;color:var(--muted);font-size:14px;}
.empty svg{width:40px;height:40px;color:var(--line-strong);margin-bottom:10px;}

/* pipeline badges */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.03em;padding:5px 11px;border-radius:30px;white-space:nowrap;}
.state-sel{display:block;margin-top:6px;border:1px solid var(--line-strong);border-radius:7px;padding:4px 6px;font-size:11.5px;background:#fff;color:#6f6c60;font-weight:600;cursor:pointer;max-width:140px;}
.state-sel:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);}
.badge::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;}
.st-borrador{background:#eef0ea;color:#7d8a6e;}
.st-enviada{background:#e7eef6;color:#4f7099;}
.st-negociacion{background:#fbf1e0;color:#b3853a;}
.st-ganada{background:#e6f1e3;color:#4f8a53;}
.st-perdida{background:#f6ebea;color:#b0584f;}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px;}
/* KPI cards (panel) */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;cursor:pointer;transition:.15s;}
.kpi:hover{border-color:var(--olive);box-shadow:0 4px 16px rgba(95,122,78,.12);transform:translateY(-1px);}
.kpi.kpi-active{border-color:var(--olive-deep);box-shadow:0 0 0 2px rgba(95,122,78,.25);}
.kpi-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;min-height:28px;}
.kpi-value{font-size:30px;font-weight:700;line-height:1;margin:6px 0 10px;}
.kpi-target{font-size:14px;color:var(--muted);font-weight:600;}
.kpi-bar{position:relative;height:9px;background:#eceadf;border-radius:6px;overflow:visible;margin-bottom:9px;}
.kpi-bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:6px;transition:width .4s ease;}
.kpi-bar-goal{position:absolute;right:0;top:-2px;width:2px;height:13px;background:#37432c;opacity:.55;}
.kpi-bar-none{background:transparent;height:9px;}
.kpi-sub{font-size:11px;color:var(--muted);line-height:1.35;}
@media(max-width:1100px){ .kpi-grid{grid-template-columns:repeat(2,1fr);} }
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
.stat .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;}
.stat .v{font-size:28px;font-weight:700;margin-top:7px;line-height:1;}
.stat .v small{font-size:14px;color:var(--muted);font-weight:600;}

/* forms */
.field{margin-bottom:15px;display:flex;flex-direction:column;}
.field label{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line-strong);border-radius:9px;padding:10px 12px;font-size:14px;background:#fbfaf4;color:var(--ink);margin-top:auto;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);background:#fff;}
.field textarea{resize:vertical;min-height:70px;}
.frow{display:grid;gap:14px;align-items:stretch;}
.frow.c2{grid-template-columns:1fr 1fr;}
.frow.c3{grid-template-columns:1fr 1fr 1fr;}
.frow .field{margin-bottom:0;}
.frow + .frow{margin-top:15px;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(40,44,32,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 20px;overflow:auto;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:540px;box-shadow:0 24px 70px rgba(0,0,0,.3);}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.modal-h h3{margin:0;font-size:17px;font-weight:700;}
.modal-h .x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1;padding:2px 6px;}
.modal-b{padding:22px;}
.modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}

.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.toolbar .search{flex:1;min-width:200px;position:relative;}
.toolbar .search input{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:11px 12px 11px 38px;font-size:14px;background:#fff;}
.toolbar .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted);}
.filterpills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{background:#fff;border:1px solid var(--line-strong);border-radius:30px;padding:7px 14px;font-size:12.5px;font-weight:600;color:#6f6c60;}
.pill.active{background:var(--olive-deep);color:#fff;border-color:var(--olive-deep);}

/* ===== COTIZADOR (preview area) ===== */
.cotz-layout{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;}
.cotz-form .card-b{max-height:none;}
.prev-wrap{position:sticky;top:96px;}
.prev-scale{transform-origin:top center;}
.linkrow{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}

.catrow{display:grid;grid-template-columns:1fr 90px 70px 70px 34px;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);}
.catrow input{border:1px solid var(--line-strong);border-radius:7px;padding:7px 9px;font-size:12.5px;background:#fbfaf4;width:100%;}
.catrow .del{background:none;border:1px solid var(--line);border-radius:50%;width:28px;height:28px;color:#aaa;font-size:15px;line-height:1;}
.catrow .del:hover{color:#b4554e;border-color:#e8cfcc;}
.catrow-h{display:grid;grid-template-columns:1fr 90px 70px 70px 34px;gap:8px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;padding-bottom:6px;}

.itemline{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:10px;background:#fbfaf5;}
.itemline .top{display:flex;gap:8px;margin-bottom:9px;}
.itemline .top select{flex:1;min-width:0;max-width:100%;width:100%;text-overflow:ellipsis;}
.itemline .top .del{background:none;border:1px solid var(--line);border-radius:8px;width:36px;color:#aaa;font-size:16px;flex:none;}
.itemline .top .del:hover{color:#b4554e;border-color:#e8cfcc;}
.itemline .nums{display:grid;grid-template-columns:1fr 60px 70px;gap:8px;}
.itemline .nums label{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:3px;}
.itemline .nums input{width:100%;border:1px solid var(--line-strong);border-radius:7px;padding:7px 8px;font-size:13px;background:#fff;}
.itemline .subline{text-align:right;font-size:12px;color:var(--olive-deep);font-weight:700;margin-top:7px;}

.help{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:4px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2f3a26;color:#fff;padding:13px 22px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ================= PRINTABLE DOCUMENT (mirrors source PDF) ================= */
.page{
  width:210mm;min-height:297mm;background:var(--paper);margin:0 auto;
  padding:11mm 14mm 7mm;box-shadow:0 14px 44px rgba(0,0,0,.16);
  position:relative;display:flex;flex-direction:column;
  font-family:'Archivo',sans-serif;color:var(--ink);
}
/* keep coloured fills when printing (otherwise the PDF prints all white) */
.page,.page *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
.page .head{display:grid;grid-template-columns:1.15fr 1.4fr .9fr;align-items:center;gap:0;padding-bottom:12px;}
.page .head>div{padding:0 22px;}
.page .head>div:first-child{padding-left:0;}
.page .head>div:last-child{padding-right:0;}
.page .col-div{border-left:1px solid var(--line-strong);}
.page .logo-img{height:50px;width:auto;display:block;}
.page .doc-title{font-weight:600;font-size:21px;letter-spacing:.1em;color:var(--ink);line-height:1.05;white-space:nowrap;}
.page .doc-rule{width:34px;height:3px;background:var(--olive);margin:11px 0;border-radius:2px;}
.page .doc-ref{font-size:15px;color:#555;}
.page .doc-ref b{color:var(--ink);font-weight:600;}
.page .meta-ico{width:26px;height:26px;color:var(--olive);margin-bottom:10px;}
.page .meta-label{font-size:11px;letter-spacing:.16em;color:var(--muted);font-weight:600;margin-bottom:4px;}
.page .meta-val{font-size:14px;font-weight:500;}
.page .client{background:#f1efe6;border-radius:8px;display:grid;grid-template-columns:1.2fr .9fr 1.3fr .8fr;align-items:center;padding:14px 4px;margin-top:6px;}
.page .client>div{padding:0 14px;min-width:0;}
.page .client>div+div{border-left:1px solid #ddd9cc;}
.page .cl-label{font-size:10.5px;letter-spacing:.18em;color:var(--muted);font-weight:600;margin-bottom:7px;}
.page .cl-name{font-size:20px;font-weight:600;line-height:1.05;overflow:hidden;text-overflow:ellipsis;}
.page .cl-name .ul{display:block;width:26px;height:3px;background:var(--olive);margin-top:10px;border-radius:2px;}
.page .cl-row{display:flex;align-items:flex-start;gap:8px;}
.page .cl-row svg{width:22px;height:22px;color:var(--olive);flex:none;margin-top:1px;}
.page .cl-mini{font-size:10.5px;letter-spacing:.16em;color:var(--muted);font-weight:600;margin-bottom:5px;}
.page .cl-data{font-size:12px;font-weight:500;white-space:nowrap;}
.page .sec{display:flex;align-items:center;gap:14px;margin:18px 0 10px;}
.page .sec .num{background:var(--olive);color:var(--olive-ink);font-weight:700;font-size:14px;letter-spacing:.05em;padding:7px 11px;border-radius:4px;}
.page .sec .t{font-size:14px;font-weight:600;letter-spacing:.16em;color:var(--ink);white-space:nowrap;}
.page .sec .ln{flex:1;height:1px;background:var(--line-strong);}
.page table.items{width:100%;border-collapse:collapse;font-size:12.5px;}
.page table.items thead th{background:var(--olive);color:var(--olive-ink);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:13px 10px;text-align:left;}
.page table.items thead th.c{text-align:center;}
.page table.items thead th.r{text-align:right;}
.page table.items tbody td{padding:17px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
.page table.items tbody tr:last-child td{border-bottom:none;}
.page .it-num{color:var(--olive-deep);font-weight:600;text-align:center;width:58px;}
.page .it-detail{font-weight:500;}
.page .it-c{text-align:center;}
.page .it-r{text-align:right;}
.page .it-sub{text-align:right;font-weight:600;}
.page .total-wrap{display:grid;grid-template-columns:1fr auto;align-items:stretch;margin-top:2px;}
.page .total-label{display:flex;align-items:center;justify-content:flex-end;padding:0 26px;background:#f1efe6;font-weight:600;letter-spacing:.1em;font-size:14px;}
.page .total-box{background:var(--olive);color:var(--olive-ink);padding:12px 30px;min-width:170px;text-align:right;}
.page .total-box .big{font-size:34px;font-weight:700;line-height:1;}
.page .total-box .cur{font-size:11px;letter-spacing:.14em;opacity:.75;display:block;margin-bottom:4px;}
.page .note{margin-top:12px;color:#6f6c60;font-size:10.5px;line-height:1.45;text-align:center;}
.page .conds{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:20px;}
.page .conds>div{padding:0 20px;}
.page .conds>div:first-child{padding-left:2px;}
.page .conds>div+div{border-left:1px solid var(--line);}
.page .cd-top{display:flex;align-items:center;margin-bottom:12px;}
.page .cd-num{font-size:22px;font-weight:700;color:var(--olive-deep);line-height:1;}
.page .cd-label{font-size:11px;letter-spacing:.1em;font-weight:600;color:var(--ink);margin-bottom:6px;min-height:28px;}
.page .cd-val{font-size:12.5px;color:#5f5c52;line-height:1.4;}
.page .notas{display:flex;gap:0;margin-top:18px;background:#f3f1e8;border-left:4px solid var(--olive);border-radius:0 6px 6px 0;padding:16px 20px;}
.page .notas .nt-head{display:flex;align-items:center;font-weight:600;letter-spacing:.12em;font-size:13px;color:var(--ink);width:140px;flex:none;}
.page .notas .nt-body{display:grid;grid-template-columns:1fr 1fr;gap:24px;font-size:12px;color:#5f5c52;line-height:1.45;}
.page .firma{margin-top:14px;display:flex;align-items:baseline;gap:14px;}
.page .firma .small{font-size:11px;letter-spacing:.1em;color:var(--muted);font-weight:600;}
.page .firma .firma-nombre{font-size:13px;font-weight:600;color:#37432c;}
.page .foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--line-strong);display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:18px;}
.page .foot .foot-logo{height:26px;display:block;}
.page .foot .foot-c{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;}
.page .foot .fi{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#5f5c52;}
.page .foot .fi svg{width:16px;height:16px;color:var(--olive);}
.page .foot .foot-tuv{height:46px;display:block;opacity:.85;}
.page.no-total .total-wrap,.page.no-total .col-sub,.page.no-total .it-sub{display:none;}

/* ---------- PRINT ---------- */
@media print{
  @page{size:A4;margin:0;}
  html,body{background:#fff;margin:0;padding:0;height:auto;}
  .side,.topbar,.cotz-form,.no-print,.toast{display:none !important;}
  .app,.main,.content{display:block;padding:0 !important;margin:0 !important;}
  .cotz-layout{display:block;}
  .prev-wrap{position:static;}
  .prev-scale{transform:none !important;height:auto !important;}
  #docMount{margin:0;}
  .page{
    box-shadow:none;margin:0 !important;width:210mm;
    min-height:0 !important;height:auto !important;max-height:296mm;
    overflow:hidden;page-break-after:avoid;page-break-inside:avoid;break-inside:avoid;
  }
  .page::after{content:none;}
  /* nada después de .page debe forzar otra página */
  .toast,.modal-bg{display:none !important;}
}
@media(max-width:1100px){
  .cotz-layout{grid-template-columns:1fr;}
  .prev-wrap{position:static;overflow:auto;}
  .stats{grid-template-columns:repeat(2,1fr);}
}
/* ---------- MÓVIL (Android / Apple) ---------- */
@media(max-width:760px){
  .app{flex-direction:column;}
  .side{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center;padding:12px 14px;gap:8px;}
  .side .brand{margin-bottom:0;margin-right:auto;}
  .side nav{flex-direction:row;flex-wrap:wrap;gap:4px;width:100%;order:3;}
  .navbtn{flex:1;min-width:0;justify-content:center;padding:9px 8px;font-size:12.5px;}
  .navbtn span,.navbtn{white-space:nowrap;}
  .side .sp{display:none;}
  .side .data-actions{flex-direction:row;flex-wrap:wrap;border-top:none;padding-top:0;width:100%;order:4;gap:6px;}
  .side .data-actions .lbl{display:none;}
  .side .data-actions .minib{flex:1;justify-content:center;}
  .side .autosave{width:100%;order:5;}
  .topbar{padding:14px 16px;flex-wrap:wrap;gap:10px;position:static;}
  .topbar h1{font-size:17px;}
  #topActions{width:100%;}
  #topActions .btn{flex:1;}
  .content{padding:16px 14px 50px;}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .kpi-value{font-size:24px;}
  .stats{grid-template-columns:1fr 1fr;}
  /* tablas con scroll horizontal en vez de romper */
  .card{overflow-x:auto;}
  table.grid{min-width:560px;}
  .frow.c2,.frow.c3{grid-template-columns:1fr;}
  .toolbar{flex-direction:column;align-items:stretch;}
  /* vista previa del PDF: que entre escalada */
  .prev-scale{transform-origin:top left;}
  .modal{max-width:100%;}
  .itemline .nums{grid-template-columns:1fr 1fr;}
}
@media(max-width:420px){
  .kpi-grid{grid-template-columns:1fr;}
  .navbtn{font-size:11.5px;padding:8px 5px;}
}

// Cliente REST mínimo (sin librerías externas; usa fetch nativo)
async function sbFetch(path, opts={}){
  const res = await fetch(SB_REST + path, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...(opts.headers||{})
    }
  });
  if(!res.ok){
    const txt = await res.text().catch(()=> '');
    throw new Error('Supabase '+res.status+': '+txt);
  }
  if(res.status===204) return null;
  return res.json();
}

function isoToText(iso){
  if(!iso) return '';
  const p=String(iso).split('-'); if(p.length!==3) return iso;
  const y=+p[0], m=+p[1], d=+p[2];
  if(!y||!m||!d) return iso;
  return `${d} de ${MESES[m-1]} de ${y}`;
}

  const vigentes = q.filter(x=>!['ganada','perdida'].includes(x.state));

  const cotsCM = q.filter(x=>monthKey(x.created)===cm);
  const cotsPM = q.filter(x=>monthKey(x.created)===pm);
  const convCM = cotsCM.length ? (ganadasCM.length/cotsCM.length*100) : 0;
  const convPM = cotsPM.length ? (ganadasPM.length/cotsPM.length*100) : 0;

  // definición de las 8 cajas (objetivo, valor, formato, filtro)
  const cards = [
    { key:'totales', label:'Cotizaciones totales', value:q.length, target:null,
      fn:()=>true, sub:'Total histórico' },
    { key:'vigentes', label:'Cotizaciones vigentes', value:vigentes.length, target:30,
      fn:x=>!['ganada','perdida'].includes(x.state), sub:'No ganadas ni perdidas · objetivo 30' },

      fn:x=>x.state==='ganada'&&monthKey(x.created)===cm, sub:'Objetivo 3 / mes' },
    { key:'ganPM', label:'Ganadas mes anterior', value:ganadasPM.length, target:3,
      fn:x=>x.state==='ganada'&&monthKey(x.created)===pm, sub:'Objetivo 3 / mes' },
    { key:'convCM', label:'Conversión mes actual', value:convCM, target:10, pct:true,
      fn:x=>monthKey(x.created)===cm, sub:'Ganadas / cotizadas · objetivo 10%' },
    { key:'convPM', label:'Conversión mes anterior', value:convPM, target:10, pct:true,
      fn:x=>monthKey(x.created)===pm, sub:'Ganadas / cotizadas · objetivo 10%' },
    { key:'cotsCM', label:'Cotizaciones mes en curso', value:cotsCM.length, target:30,

    { key:'cotsPM', label:'Cotizaciones mes anterior', value:cotsPM.length, target:30,
      fn:x=>monthKey(x.created)===pm, sub:'Objetivo 30 / mes' },
  ];

  const cardHTML = cards.map(c=>{
    const hasTarget = c.target!=null;
    const ok = hasTarget ? c.value>=c.target : true;
    const color = !hasTarget ? 'var(--olive-deep)' : (ok ? '#4f8a53' : '#b4554e');
    const pctFill = hasTarget ? Math.min(100, (c.value/c.target)*100) : 100;
    const valTxt = c.pct ? c.value.toFixed(1)+'%' : c.value;
    const tgtTxt = hasTarget ? (c.pct ? c.target+'%' : c.target) : '';
    const active = dashFilter && dashFilter.key===c.key ? 'kpi-active' : '';
    return `
    <div class="kpi ${active}" onclick="dashSelect('${c.key}')">
      <div class="kpi-label">${c.label}</div>

      <div class="kpi-sub">${c.sub}</div>
    </div>`;
  }).join('');

  // lista filtrada abajo
  let listed = [...q].sort((a,b)=>b.created-a.created);
  let listTitle = 'Cotizaciones recientes';
  if(dashFilter){
    const c = cards.find(x=>x.key===dashFilter.key);

function fitPreview(){

/* ---- save / print ---- */
async function saveQuote(opts){
  opts = opts || {};
  CUR.client = document.getElementById('e_clientname') ? val('e_clientname').trim() : CUR.client;
  try{
    // Si el cliente escrito no existe en la base, crearlo y vincularlo
    if(CUR.client){
      const existeCliente = DB.clients.find(c=> c.name.trim().toLowerCase() === CUR.client.toLowerCase());
      if(existeCliente){
        CUR.clientId = existeCliente.id;
      } else {
        const nuevo = await SB.addClient(clientToRow({
          name:CUR.client, attn:CUR.attn||'', email:CUR.email||'', phone:CUR.phone||'', notes:''
        }));
        CUR.clientId = nuevo.id;
        await reloadDB(); // refresca el desplegable de clientes
      }
    }
    if(!CUR.id){
      // Cotización nueva: pedir número de oferta atómico a Supabase
      CUR.state = opts.state || 'borrador';
      if(!CUR.seq){
        CUR.seq = await SB.nextSeq();          // incremento atómico (no se pisa entre usuarios)
        CUR.ref = refStr(CUR.seq);
      }
      const row = await SB.addQuote(quoteToRow(CUR));
      CUR.id = row.id;                          // adoptar el uuid de Supabase
      await reloadDB();
    } else {
      if(opts.state) CUR.state = opts.state;
      await SB.updateQuote(CUR.id, quoteToRow(CUR));
      await reloadDB();
    }
    if(!opts.silent){ toast('Cotización guardada'); go('quotes'); }
  }catch(e){ toast('Error al guardar: '+e.message); throw e; }
}
function quoteTipologia(){
  // Deriva la "tipología de módulo" de los ítems. Si hay más de una, "Varios".
  const tipos = new Set();
  (CUR.items||[]).forEach(it=>{
    let t = (it.detail||'').trim();
    if(!t) return;
    // Limpieza: saca prefijos comerciales y deja el tipo de módulo
    t = t.replace(/^alquiler\s+/i,'')
         .replace(/\b\d+\s*mts?\.?\b/ig,'')   // medidas (6 mts.)
         .replace(/[.,;:\s]+$/,'')             // puntuación colgante final
         .replace(/\s{2,}/g,' ').trim();
    // descarta servicios que no son tipologías de módulo
    if(/traslado|instalaci[oó]n|flete/i.test(t)) return;
    if(t) tipos.add(t.toLowerCase());
  });
  if(tipos.size===0) return 'Modulo';
  if(tipos.size>1) return 'Varios';
  // Capitaliza la única tipología
  const u = [...tipos][0];
  return u.charAt(0).toUpperCase()+u.slice(1);
}
function sanitizeFile(s){
  return String(s||'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // saca acentos
    .replace(/[\/\\:*?"<>|]/g,' ')                    // chars inválidos
    .replace(/\s+/g,' ').trim();
}
function quoteFileName(){
  const nro = String(CUR.seq).padStart(4,'0');
  const cli = sanitizeFile(CUR.client) || 'Cliente';
  const tip = sanitizeFile(quoteTipologia());
  return `OE-${nro}-${cli}-${tip}`;
}
async function printQuote(){
  // Al generar el PDF, la cotización queda registrada en el CRM como ENVIADA
  CUR.client = (document.getElementById('e_clientname') ? val('e_clientname').trim() : CUR.client) || CUR.client;
  CUR.state = 'enviada';
  try{
    await saveQuote({silent:true, state:'enviada'});  // asigna nº y persiste en Supabase
  }catch(e){ return; } // si falla el guardado, no imprime (ya avisó el toast)
  // refleja el cambio: nº de oferta y estado en el editor abierto
  renderEditor(false);
  const sel=document.getElementById('e_state'); if(sel) sel.value='enviada';
  toast('Cotización marcada como Enviada');
  const scale=document.getElementById('prevScale');
  const prev = scale? scale.style.transform : '';
  if(scale) scale.style.transform='none';
  const prevTitle = document.title;
  document.title = quoteFileName();
  setTimeout(()=>{
    window.print();
    if(scale) scale.style.transform=prev;
    setTimeout(()=>{ document.title = prevTitle; }, 500);
  }, 60);
}

/* ================= AUTENTICACIÓN MICROSOFT (Azure AD) ================= */
/* El login solo valida identidad (que seas de la organización 4housing22).
   Los datos viven en Supabase, no en SharePoint, así que no pide permisos de archivos. */
const MSAL_CONFIG = {
  clientId: '66a475e3-745f-4931-8085-ee71a0b6d6fe',
  tenantId: 'c408b6d8-ae0b-4d30-9056-da52e18116c4',
  authority: 'https://login.microsoftonline.com/c408b6d8-ae0b-4d30-9056-da52e18116c4',
  redirectUri: 'https://labo-comercial.github.io/4housing-rental/',
};
let _msal = null, AUTH_USER = null;

function authScreen(msg, btn){
  document.body.innerHTML = `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#eceae1;font-family:'Archivo',sans-serif;">
    <div style="background:#fff;border:1px solid #e2dfd4;border-radius:16px;padding:40px 38px;max-width:380px;text-align:center;box-shadow:0 14px 44px rgba(0,0,0,.10);">
      <div style="font-family:'Quicksand',sans-serif;font-weight:700;font-size:22px;color:#37432c;margin-bottom:6px;">4housing <span style="color:#9db98b;">Rental</span></div>
      <div style="font-size:13px;color:#94917f;margin-bottom:26px;">Cotizador & CRM</div>
      <div style="font-size:14px;color:#5f5c52;margin-bottom:22px;line-height:1.5;">${msg}</div>
      ${btn?`<button id="authBtn" style="background:#5f7a4e;color:#fff;border:none;border-radius:9px;padding:12px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">${btn}</button>`:''}
    </div>
  </div>`;
}

async function doLogin(){
  try{
    const res = await _msal.loginPopup({ scopes:['User.Read'], redirectUri:MSAL_CONFIG.redirectUri });
    if(res && res.account){ _msal.setActiveAccount(res.account); location.reload(); }
  }catch(e){
    authScreen('No se pudo iniciar sesión.<br><span style="font-size:12px;color:#94917f">'+esc(e.message||e)+'</span>', 'Reintentar');
    setTimeout(()=>{ const b=document.getElementById('authBtn'); if(b) b.onclick=doLogin; }, 50);
  }
}

async function initAuth(){
  if(typeof msal === 'undefined'){
    // La librería no cargó (sin internet o CDN bloqueado)
    authScreen('No se pudo cargar el sistema de inicio de sesión. Verificá tu conexión a internet.', 'Reintentar');
    setTimeout(()=>{ const b=document.getElementById('authBtn'); if(b) b.onclick=()=>location.reload(); }, 50);
    return false;
  }
  _msal = new msal.PublicClientApplication({
    auth: { clientId:MSAL_CONFIG.clientId, authority:MSAL_CONFIG.authority, redirectUri:MSAL_CONFIG.redirectUri },
    cache: { cacheLocation:'localStorage' }
  });
  await _msal.initialize();
  const accts = _msal.getAllAccounts();
  if(accts.length>0){
    _msal.setActiveAccount(accts[0]);
    AUTH_USER = accts[0];
    return true;
  }
  // No hay sesión: mostrar pantalla de login
  authScreen('Ingresá con tu cuenta de Microsoft de la organización para acceder.', 'Iniciar sesión con Microsoft');
  setTimeout(()=>{ const b=document.getElementById('authBtn'); if(b) b.onclick=doLogin; }, 50);
  return false;
}

window.saveClient=saveClient; window.delClient=delClient; window.addCat=addCat; window.delCat=delCat;
window.addItem=addItem; window.delItem=delItem; window.saveQuote=saveQuote; window.printQuote=printQuote;
window.go=go; window.closeModal=closeModal; window.setQuoteState=setQuoteState; window.dashSelect=dashSelect;
window.doLogin=doLogin;

// Arranque: 1) login Microsoft, 2) cargar Supabase, 3) mostrar panel
(async function start(){
  const ok = await initAuth();
  if(!ok) return; // la pantalla de login ya se mostró
  // Mostrar usuario y cablear logout
  const lbl = document.getElementById('autosaveLbl');
  if(lbl && AUTH_USER) lbl.textContent = AUTH_USER.name || AUTH_USER.username || 'Conectado';
  const lo = document.getElementById('btnLogout');
  if(lo) lo.onclick = async()=>{
    try{ await _msal.logoutPopup({ mainWindowRedirectUri: MSAL_CONFIG.redirectUri }); }
    catch(e){ location.reload(); }
  };
  const c = document.getElementById('content');
  if(c) c.innerHTML = '<div class="empty">Cargando datos desde la nube…</div>';
  try{
    await reloadDB();
    go('dashboard');
  }catch(e){
    if(c) c.innerHTML = '<div class="empty"><div style="font-weight:600;color:#b4554e">No se pudo conectar con la base de datos</div>'
      + '<div style="margin-top:6px">'+esc(e.message)+'</div>'
      + '<div style="margin-top:10px"><button class="btn" onclick="location.reload()">Reintentar</button></div></div>';
  }
})();
</script>
