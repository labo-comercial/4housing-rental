<style>
:root{
  --olive:#9db98b; --olive-deep:#5f7a4e; --olive-soft:#b8cdac; --olive-ink:#37432c;
  --cream:#f4f2ea; --paper:#ffffff; --ink:#2b2b26; --muted:#94917f;
  --line:#e2dfd4; --line-strong:#d3d0c4; --chip:#eceadf; --bg:#eceae1;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Archivo',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:var(--olive-deep);}

/* ---------- APP SHELL ---------- */
.app{display:flex;min-height:100vh;}
.side{width:230px;flex:none;background:#2f3a26;color:#e7ecdf;display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;}
.side .brand{display:flex;align-items:center;gap:8px;margin-bottom:26px;padding:0 6px;}
.side .brand img{height:30px;width:auto;display:block;filter:brightness(1.6);}
.side .brand-rental{color:#cdd6bf;font-family:'Quicksand',sans-serif;font-weight:600;font-size:17px;letter-spacing:.02em;line-height:30px;display:flex;align-items:center;}
.side nav{display:flex;flex-direction:column;gap:4px;}
.nav-group-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7e8a6c;font-weight:700;padding:14px 13px 5px;}
.nav-group-lbl:first-child{padding-top:0;}
.navbtn{display:flex;align-items:center;gap:11px;background:none;border:none;color:#cdd6bf;padding:11px 13px;border-radius:9px;font-size:14px;font-weight:600;text-align:left;letter-spacing:.01em;transition:.15s;}
.navbtn svg{width:19px;height:19px;flex:none;}
.navbtn:hover{background:rgba(255,255,255,.07);color:#fff;}
.navbtn.active{background:var(--olive);color:var(--olive-ink);}
.side .sp{flex:1;}
.side .data-actions{display:flex;flex-direction:column;gap:7px;border-top:1px solid rgba(255,255,255,.12);padding-top:16px;}
.side .data-actions .lbl{font-size:10px;letter-spacing:.16em;color:#9fb08c;font-weight:700;margin-bottom:2px;padding:0 4px;}
.minib{background:rgba(255,255,255,.08);border:none;color:#dfe7d3;padding:9px 11px;border-radius:8px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;}
.minib:hover{background:rgba(255,255,255,.16);}
.minib svg{width:15px;height:15px;}
.autosave{font-size:10px;color:#8fa07c;text-align:center;margin-top:8px;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:18px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.topbar h1{font-size:20px;font-weight:700;margin:0;letter-spacing:.01em;}
.topbar .sub{font-size:13px;color:var(--muted);margin-top:2px;}
.content{padding:26px 30px 60px;flex:1;}

/* ---------- BUTTONS ---------- */
.btn{background:var(--olive-deep);color:#fff;border:none;border-radius:9px;padding:11px 18px;font-size:13.5px;font-weight:600;letter-spacing:.02em;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1.1;min-height:42px;box-sizing:border-box;vertical-align:middle;}
.btn:hover{background:#536a44;}
.btn svg{width:16px;height:16px;}
.btn.ghost{background:#fff;color:var(--olive-deep);border:1px solid var(--line-strong);}
.btn.ghost:hover{background:var(--cream);}
.btn.sm{padding:8px 13px;font-size:12.5px;}
.btn.danger{background:#fff;color:#b4554e;border:1px solid #e8cfcc;}
.btn.danger:hover{background:#fbf0ef;}

/* ---------- CARDS / TABLES ---------- */
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:0;overflow:hidden;}
.card + .card{margin-top:20px;}
.card.cuenta-card + .card.cuenta-card{margin-top:0;}
.card-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-h h3{margin:0;font-size:15px;font-weight:700;letter-spacing:.01em;}
.card-b{padding:18px 20px;}

table.grid{width:100%;border-collapse:collapse;font-size:13.5px;}
table.grid th{text-align:left;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:11px 16px;border-bottom:1px solid var(--line);background:#faf9f4;}
table.grid th.r,table.grid td.r{text-align:right;}
table.grid th.c,table.grid td.c{text-align:center;}
table.grid td{padding:14px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
table.grid tbody tr:last-child td{border-bottom:none;}
table.grid tbody tr.clickable:hover{background:#fbfaf3;cursor:pointer;}
table.grid th.th-sort{cursor:pointer;user-select:none;white-space:nowrap;}
table.grid th.th-sort:hover{color:var(--olive-deep);background:#f3f1e7;}
table.grid th.th-active{color:var(--olive-deep);}
table.grid th .th-arrow{font-size:9px;margin-left:2px;}
/* agrupación de versiones */
.ver-toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;}
.ver-toggle .chev{width:15px;height:15px;color:var(--olive-deep);flex:none;transition:transform .18s;}
.ver-grp.open .ver-toggle .chev{transform:rotate(90deg);}
.ver-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;padding:0 6px;border-radius:30px;background:var(--olive);color:var(--olive-ink);font-size:10.5px;font-weight:700;letter-spacing:.02em;}
.ver-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--olive-deep);background:#eef0ea;border-radius:5px;padding:2px 6px;margin-left:7px;vertical-align:middle;}
tr.ver-child{background:#fbfaf5;}
tr.ver-child td{border-bottom:1px solid var(--line);}
tr.ver-child td:first-child{padding-left:38px;position:relative;}
tr.ver-child td:first-child::before{content:"";position:absolute;left:22px;top:0;bottom:0;width:2px;background:var(--line-strong);}
tr.ver-child.hide{display:none;}
.ver-tag{font-size:11px;font-weight:600;color:#94917f;}
.empty{padding:42px 20px;text-align:center;color:var(--muted);font-size:14px;}
.empty svg{width:40px;height:40px;color:var(--line-strong);margin-bottom:10px;}

/* pipeline badges */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.03em;padding:5px 11px;border-radius:30px;white-space:nowrap;}
.state-sel{display:block;margin-top:6px;border:1px solid var(--line-strong);border-radius:7px;padding:4px 6px;font-size:11.5px;background:#fff;color:#6f6c60;font-weight:600;cursor:pointer;max-width:140px;}
.state-sel:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);}
.badge::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;}
.st-nuevo{background:#eef0f2;color:#8a9098;}
.st-borrador{background:#eef0ea;color:#7d8a6e;}
.st-enviada{background:#e7eef6;color:#4f7099;}
.st-negociacion{background:#fbf1e0;color:#b3853a;}
.st-ganada{background:#e6f1e3;color:#4f8a53;}
.st-perdida{background:#f6ebea;color:#b0584f;}
/* prioridad oportunidades */
.pr-urgente{background:#f6e6e4;color:#b0463c;}
.pr-alta{background:#fbeede;color:#b3792a;}
.pr-media{background:#eef0ea;color:#7d8a6e;}
.pr-baja{background:#eef0f2;color:#8a9098;}
/* estado oportunidades */
.os-nuevo{background:#eef0f2;color:#8a9098;}
.os-borrador{background:#eef0ea;color:#7d8a6e;}
.os-enviada{background:#e7eef6;color:#4f7099;}
.os-negociacion{background:#fbf1e0;color:#b3853a;}
.os-ganada{background:#e6f1e3;color:#4f8a53;}
.os-perdida{background:#f6ebea;color:#b0584f;}
.os-desestimada{background:#ededed;color:#9a9a9a;text-decoration:line-through;}
.alta-sin_iniciar{background:#f1efe9;color:#9a9080;}
.alta-en_tramite{background:#fbf1e0;color:#b3853a;}
.alta-dado_alta{background:#e6f1e3;color:#4f8a53;}
.cob-pendiente{background:#f1efe9;color:#9a9080;}
.cob-parcial{background:#fbf1e0;color:#b3853a;}
.cob-cobrado{background:#e6f1e3;color:#4f8a53;}
.un-rental{background:#eaf0e4;color:#5f7a4e;}
.un-ventas{background:#e7eef3;color:#46708a;}
.un-ambas{background:#f3eee0;color:#9a7a3a;}
.cob-kpi{cursor:pointer;padding:6px 9px;border-radius:8px;border:1px solid transparent;transition:background .12s,border-color .12s;}
.cob-kpi:hover{background:#f6f4ee;}
.cob-kpi.on{background:#eaf0e4;border-color:#9db98b;}
.gst-item{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);}
.gst-tipo{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:2px 8px;border-radius:20px;background:#eef0ea;color:#5f7a4e;white-space:nowrap;}
.sem{display:inline-block;width:11px;height:11px;border-radius:50%;}
.sem-verde{background:#4f8a53;}
.sem-amarillo{background:#e0a93a;}
.sem-rojo{background:#b0584f;}
.sem-sinfecha{background:#d8d4c8;}
.age-chart{display:flex;flex-direction:column;gap:8px;}
.age-row{display:grid;grid-template-columns:60px 1fr auto;align-items:center;gap:12px;cursor:pointer;padding:4px 6px;border-radius:7px;transition:background .12s;}
.age-row:hover{background:#f1efe9;}
.age-row.on{background:#eaf0e4;outline:1px solid #9db98b;}
.age-lbl{font-size:12.5px;font-weight:700;color:#37432c;}
.age-track{background:#eef0ea;border-radius:6px;height:16px;overflow:hidden;}
.age-fill{height:100%;border-radius:6px;min-width:2px;}
.age-val{font-size:12.5px;font-weight:700;color:#37432c;white-space:nowrap;}
.age-n{font-weight:400;color:var(--muted);margin-left:4px;}
.qc-chart{display:flex;flex-direction:column;gap:9px;}
.qc-row{display:grid;grid-template-columns:130px 1fr 34px;align-items:center;gap:10px;}
.qc-name{font-size:12.5px;color:#37432c;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qc-track{background:#eef0ea;border-radius:6px;height:14px;overflow:hidden;}
.qc-fill{height:100%;background:linear-gradient(90deg,#9db98b,#5f7a4e);border-radius:6px;min-width:2px;}
.qc-val{font-size:12.5px;font-weight:700;color:#5f7a4e;text-align:right;}
/* estado prospectos */
.ps-sin_contactar{background:#eef0f2;color:#8a9098;}
.ps-contactado{background:#e7eef6;color:#4f7099;}
.ps-en_conversacion{background:#fbf1e0;color:#b3853a;}
.ps-calificado{background:#e6f1e3;color:#4f8a53;}
.ps-descartado{background:#f6ebea;color:#b0584f;}
.emp-card{cursor:pointer;}
.emp-stat-pills{display:flex;gap:6px;flex-wrap:wrap;}
.mini-pill{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;}
.prosp-contact svg{width:14px;height:14px;vertical-align:-2px;margin-right:4px;color:var(--muted);}
.kpi-prosp .kpi-value.ok{color:#4f8a53;}
.kpi-prosp .kpi-value.bad{color:#b0584f;}
.kpi-prog-num{display:flex;align-items:baseline;gap:5px;margin:2px 0 9px;}
.kpi-prog-val{font-size:27px;font-weight:700;line-height:1;}
.kpi-prog-tgt{font-size:13px;color:var(--muted);font-weight:600;}
.kpi-prog-bar{height:6px;background:#e7e4d8;border-radius:20px;overflow:hidden;}
.kpi-prog-fill{height:100%;border-radius:20px;transition:width .3s;}
.kpi-prog{transition:box-shadow .15s,border-color .15s;}
.kpi-active{box-shadow:0 0 0 2px var(--olive);}
/* chips de filtro oportunidades */
.opp-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.opp-filters select{border:1px solid var(--line-strong);border-radius:8px;padding:7px 10px;font-size:12.5px;background:#fff;color:#6f6c60;font-weight:600;cursor:pointer;}
.opp-filters select:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);}
.vend-filter{border:1px solid var(--line-strong);border-radius:8px;padding:7px 10px;font-size:12.5px;background:#fff;color:#6f6c60;font-weight:600;cursor:pointer;}
.vend-filter:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);}
.opp-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px;margin:6px 0 4px;}
.opp-detail-grid .fld label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:4px;}
.opp-detail-grid .fld .val{font-size:14px;color:#37432c;}
.opp-act-item{padding:11px 0;border-bottom:1px solid var(--line);font-size:13px;}
.opp-act-item:last-child{border-bottom:none;}
.opp-act-item .meta{font-size:11px;color:var(--muted);margin-top:3px;}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px;}
/* KPI cards (panel) */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;cursor:pointer;transition:.15s;}
.kpi:hover{border-color:var(--olive);box-shadow:0 4px 16px rgba(95,122,78,.12);transform:translateY(-1px);}
.kpi.kpi-active{border-color:var(--olive-deep);box-shadow:0 0 0 2px rgba(95,122,78,.25);}
.kpi-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;min-height:28px;}
.kpi-value{font-size:30px;font-weight:700;line-height:1;margin:6px 0 10px;}
.kpi-target{font-size:14px;color:var(--muted);font-weight:600;}
.kpi-bar{position:relative;height:9px;background:#eceadf;border-radius:6px;overflow:visible;margin-bottom:9px;}
.kpi-bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:6px;transition:width .4s ease;}
.kpi-bar-goal{position:absolute;right:0;top:-2px;width:2px;height:13px;background:#37432c;opacity:.55;}
.kpi-bar-none{background:transparent;height:9px;}
.kpi-sub{font-size:11px;color:var(--muted);line-height:1.35;}
@media(max-width:1100px){ .kpi-grid{grid-template-columns:repeat(2,1fr);} }
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
.stat .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;}
.stat .v{font-size:28px;font-weight:700;margin-top:7px;line-height:1;}
.stat .v small{font-size:14px;color:var(--muted);font-weight:600;}

/* forms */
.field{margin-bottom:15px;display:flex;flex-direction:column;}
.field label{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;max-width:100%;min-width:0;border:1px solid var(--line-strong);border-radius:9px;padding:10px 12px;font-size:14px;background:#fbfaf4;color:var(--ink);margin-top:auto;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);background:#fff;}
.field textarea{resize:vertical;min-height:70px;}
.inp{width:100%;border:1px solid var(--line-strong);border-radius:9px;padding:10px 12px;font-size:14px;background:#fbfaf4;color:var(--ink);}
.inp:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);background:#fff;}
textarea.inp{resize:vertical;min-height:60px;}
.frow{display:grid;gap:14px;align-items:stretch;}
.frow.c2{grid-template-columns:1fr 1fr;}
.frow.c3{grid-template-columns:1fr 1fr 1fr;}
.frow .field{margin-bottom:0;min-width:0;}
.frow + .frow{margin-top:15px;}
.frow + .field{margin-top:15px;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(40,44,32,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 20px;overflow:auto;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:540px;box-shadow:0 24px 70px rgba(0,0,0,.3);}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.modal-h h3{margin:0;font-size:17px;font-weight:700;}
.modal-h .x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1;padding:2px 6px;}
.modal-b{padding:22px;}
.modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;}

.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.toolbar .search{flex:1;min-width:200px;position:relative;}
.toolbar .search input{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:11px 12px 11px 38px;font-size:14px;background:#fff;}
.toolbar .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted);}
.filterpills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{background:#fff;border:1px solid var(--line-strong);border-radius:30px;padding:7px 14px;font-size:12.5px;font-weight:600;color:#6f6c60;}
.pill.active{background:var(--olive-deep);color:#fff;border-color:var(--olive-deep);}

/* ===== COTIZADOR (preview area) ===== */
.cotz-layout{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;}
.cotz-form{min-width:0;}
.cotz-form .field input,.cotz-form .field select{max-width:100%;}
.cotz-form .card-b{max-height:none;}
.prev-wrap{position:sticky;top:96px;}
.prev-scale{transform-origin:top center;}
.linkrow{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}

.catrow{display:grid;grid-template-columns:1fr 90px 70px 70px 34px;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);}
.catrow input{border:1px solid var(--line-strong);border-radius:7px;padding:7px 9px;font-size:12.5px;background:#fbfaf4;width:100%;}
.catrow .del{background:none;border:1px solid var(--line);border-radius:50%;width:28px;height:28px;color:#aaa;font-size:15px;line-height:1;}
.catrow .del:hover{color:#b4554e;border-color:#e8cfcc;}
.catrow-h{display:grid;grid-template-columns:1fr 90px 70px 70px 34px;gap:8px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;padding-bottom:6px;}

.itemline{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:10px;background:#fbfaf5;}
.itemline .top{display:flex;gap:8px;margin-bottom:9px;}
.itemline .top select{flex:1;min-width:0;max-width:100%;width:100%;text-overflow:ellipsis;}
.itemline .top .del{background:none;border:1px solid var(--line);border-radius:8px;width:36px;color:#aaa;font-size:16px;flex:none;}
.itemline .top .del:hover{color:#b4554e;border-color:#e8cfcc;}
.itemline .nums{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
.itemline .nums>div{flex:0 0 auto;}
.itemline .nums>div:first-child{flex:1 1 130px;min-width:130px;}
.itemline .nums .i-plazo-wrap{flex:0 0 110px;}
.itemline .nums .i-periodo-wrap{flex:1 1 180px;min-width:180px;}
.itemline .nums>div:nth-child(2){flex:0 0 70px;}
.itemline .nums>div:nth-child(3){flex:0 0 130px;}
.itemline .nums label{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:3px;}
.itemline .nums input,.itemline .nums select{width:100%;border:1px solid var(--line-strong);border-radius:7px;padding:7px 8px;font-size:13px;background:#fff;box-sizing:border-box;}
.itemline .subline{text-align:right;font-size:12px;color:var(--olive-deep);font-weight:700;margin-top:7px;}

.help{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:4px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2f3a26;color:#fff;padding:13px 22px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ================= PRINTABLE DOCUMENT (mirrors source PDF) ================= */
.page{
  width:210mm;min-height:297mm;background:var(--paper);margin:0 auto;
  padding:11mm 14mm 7mm;box-shadow:0 14px 44px rgba(0,0,0,.16);
  position:relative;display:flex;flex-direction:column;
  font-family:'Archivo',sans-serif;color:var(--ink);
}
/* keep coloured fills when printing (otherwise the PDF prints all white) */
.page,.page *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
.page .head{display:grid;grid-template-columns:1fr 1.3fr .8fr .85fr;align-items:center;gap:0;padding-bottom:12px;}
.page .head>div{padding:0 20px;}
.page .head>div:first-child{padding-left:0;}
.page .head>div:last-child{padding-right:0;}
.page .head-tuv{display:flex;align-items:center;justify-content:flex-end;}
.page .head-tuv .head-tuv-img{height:80px;width:auto;display:block;opacity:.9;}
.page .col-div{border-left:1px solid var(--line-strong);}
.page .logo-img{height:50px;width:auto;display:block;}
.page .doc-title{font-weight:600;font-size:19px;letter-spacing:.08em;color:var(--ink);line-height:1.1;}
.page .doc-rule{width:34px;height:3px;background:var(--olive);margin:11px 0;border-radius:2px;}
.page .doc-ref{font-size:15px;color:#555;}
.page .doc-ref b{color:var(--ink);font-weight:600;}
.page .meta-ico{width:26px;height:26px;color:var(--olive);margin-bottom:10px;}
.page .meta-label{font-size:11px;letter-spacing:.16em;color:var(--muted);font-weight:600;margin-bottom:4px;}
.page .meta-val{font-size:14px;font-weight:500;}
.page .client{background:#f1efe6;border-radius:8px;display:grid;grid-template-columns:1.2fr .9fr 1.3fr .8fr;align-items:center;padding:14px 4px;margin-top:6px;}
.page .client > div{min-width:0;padding:0 8px;}
.page .cl-row > div{min-width:0;}
.page .client>div{padding:0 14px;min-width:0;}
.page .client>div+div{border-left:1px solid #ddd9cc;}
.page .cl-label{font-size:10.5px;letter-spacing:.18em;color:var(--muted);font-weight:600;margin-bottom:7px;}
.page .cl-name{font-size:20px;font-weight:600;line-height:1.05;overflow-wrap:anywhere;word-break:break-word;}
.page .cl-name .ul{display:block;width:26px;height:3px;background:var(--olive);margin-top:10px;border-radius:2px;}
.page .cl-row{display:flex;align-items:flex-start;gap:8px;}
.page .cl-row svg{width:22px;height:22px;color:var(--olive);flex:none;margin-top:1px;}
.page .cl-mini{font-size:10.5px;letter-spacing:.16em;color:var(--muted);font-weight:600;margin-bottom:5px;}
.page .cl-data{font-size:12px;font-weight:500;overflow-wrap:anywhere;word-break:break-word;line-height:1.3;}
.page .sec{display:flex;align-items:center;gap:14px;margin:18px 0 10px;}
.page .sec .num{background:var(--olive);color:var(--olive-ink);font-weight:700;font-size:14px;letter-spacing:.05em;padding:7px 11px;border-radius:4px;}
.page .sec .t{font-size:14px;font-weight:600;letter-spacing:.16em;color:var(--ink);white-space:nowrap;}
.page .sec .ln{flex:1;height:1px;background:var(--line-strong);}
.page table.items{width:100%;border-collapse:collapse;font-size:12.5px;}
.page table.items thead th{background:var(--olive);color:var(--olive-ink);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:13px 10px;text-align:left;}
.page table.items thead th.c{text-align:center;}
.page table.items thead th.r{text-align:right;}
.page table.items tbody td{padding:17px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
.page table.items tbody tr:last-child td{border-bottom:none;}
.page .it-num{color:var(--olive-deep);font-weight:600;text-align:center;width:58px;}
.page .it-detail{font-weight:500;}
.page .it-detail2{font-weight:400;font-size:.86em;color:#6f6a5c;margin-top:3px;line-height:1.3;}
.page .it-desc-tag{font-weight:600;font-size:.8em;color:var(--olive-deep);margin-top:4px;letter-spacing:.02em;}
.page .it-c{text-align:center;}
.page .it-r{text-align:right;}
.page .it-sub{text-align:right;font-weight:600;}
.page .total-wrap{display:grid;grid-template-columns:1fr auto;align-items:stretch;margin-top:2px;}
.page .total-label{display:flex;align-items:center;justify-content:flex-end;padding:0 26px;background:#f1efe6;font-weight:600;letter-spacing:.1em;font-size:14px;}
.page .total-box{background:var(--olive);color:var(--olive-ink);padding:12px 30px;min-width:170px;text-align:right;}
.page .total-box .big{font-size:34px;font-weight:700;line-height:1;}
.page .total-box .cur{font-size:11px;letter-spacing:.14em;opacity:.75;display:block;margin-bottom:4px;}
.page .note{margin-top:12px;color:#6f6c60;font-size:10.5px;line-height:1.45;text-align:center;}
.page .conds{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:20px;}
.page .conds>div{padding:0 20px;}
.page .conds>div:first-child{padding-left:2px;}
.page .conds>div+div{border-left:1px solid var(--line);}
.page .cd-top{display:flex;align-items:center;margin-bottom:12px;}
.page .cd-num{font-size:22px;font-weight:700;color:var(--olive-deep);line-height:1;}
.page .cd-label{font-size:11px;letter-spacing:.1em;font-weight:600;color:var(--ink);margin-bottom:6px;min-height:28px;}
.page .cd-val{font-size:12.5px;color:#5f5c52;line-height:1.4;}
.page .notas{display:flex;gap:0;margin-top:18px;background:#f3f1e8;border-left:4px solid var(--olive);border-radius:0 6px 6px 0;padding:16px 20px;}
.page .notas .nt-head{display:flex;align-items:center;font-weight:600;letter-spacing:.12em;font-size:13px;color:var(--ink);width:140px;flex:none;}
.page .notas .nt-body{display:grid;grid-template-columns:1fr 1fr;gap:24px;font-size:12px;color:#5f5c52;line-height:1.45;}
.page .firma{margin-top:14px;display:flex;align-items:baseline;gap:14px;}
.page .firma .small{font-size:11px;letter-spacing:.1em;color:var(--muted);font-weight:600;}
.page .firma .firma-nombre{font-size:13px;font-weight:600;color:#37432c;}
.page .foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--line-strong);display:grid;grid-template-columns:auto 1fr;align-items:center;gap:18px;}
.page .foot .foot-logo{height:26px;display:block;}
.page .foot .foot-c{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;}
.page .foot .fi{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#5f5c52;}
.page .foot .fi svg{width:16px;height:16px;color:var(--olive);}
.page .total-bar{height:10px;background:var(--olive);border-radius:2px;margin-top:2px;}
.page.no-total .total-wrap{display:none;}
.page .total-wrap.desc .desc-lines{display:flex;flex-direction:column;justify-content:center;padding:0 26px;background:#f1efe6;gap:4px;}
.page .total-wrap.desc .desc-line{display:flex;justify-content:space-between;gap:24px;font-size:12.5px;color:#5f5c52;letter-spacing:.04em;}
.page .total-wrap.desc .desc-line span:first-child{font-weight:600;}
.page .total-wrap.desc .desc-neg{color:#a05a4f;}

/* ---------- PRINT ---------- */
@media print{
  @page{size:A4;margin:0;}
  html,body{background:#fff;margin:0;padding:0;height:auto;}
  .side,.topbar,.cotz-form,.no-print,.toast{display:none !important;}
  .app,.main,.content{display:block;padding:0 !important;margin:0 !important;}
  .cotz-layout{display:block;}
  .prev-wrap{position:static;}
  .prev-scale{transform:none !important;height:auto !important;}
  #docMount{margin:0;}
  .page{
    box-shadow:none;margin:0 !important;width:210mm;
    min-height:0 !important;height:297mm !important;max-height:297mm;
    overflow:hidden;page-break-after:avoid;page-break-inside:avoid;break-inside:avoid;
    display:flex;flex-direction:column;
  }
  .page::after{content:none;}
  /* nada después de .page debe forzar otra página */
  .toast,.modal-bg{display:none !important;}

  /* Impresión del catálogo: oculta toda la app y muestra solo la capa */
  body.printing-catalog .app{display:none !important;}
  body.printing-catalog #catPrintLayer{display:block !important;}

  /* Impresión del estado de cuenta de cobranzas */
  body.printing-edc .app{display:none !important;}
  body.printing-edc #edcPrintLayer{display:block !important;}
}
/* Las capas de impresión no se ven en pantalla */
#catPrintLayer{display:none;}
#edcPrintLayer{display:none;}
@media print{
  #catPrintLayer .page{box-shadow:none;margin:0 !important;}
  #edcPrintLayer .page{box-shadow:none;margin:0 !important;}
}
@media(max-width:1100px){
  .cotz-layout{grid-template-columns:1fr;}
  .prev-wrap{position:static;overflow:auto;}
  .stats{grid-template-columns:repeat(2,1fr);}
}
/* ---------- MÓVIL (Android / Apple) ---------- */
@media(max-width:760px){
  .app{flex-direction:column;}
  .side{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center;padding:12px 14px;gap:8px;}
  .side .brand{margin-bottom:0;margin-right:auto;}
  .side nav{flex-direction:row;flex-wrap:wrap;gap:6px 5px;width:100%;order:3;}
  /* cada etiqueta de unidad ocupa la fila completa y fuerza salto de línea */
  .nav-group-lbl{flex:0 0 100%;width:100%;padding:8px 4px 2px;font-size:10px;}
  .nav-group-lbl:first-child{padding-top:0;}
  .navbtn{flex:1 1 0;min-width:0;justify-content:center;padding:9px 8px;font-size:12.5px;white-space:nowrap;}
  .side .sp{display:none;}
  .side .data-actions{flex-direction:row;flex-wrap:wrap;border-top:none;padding-top:0;width:100%;order:4;gap:6px;}
  .side .data-actions .lbl{display:none;}
  .side .data-actions .minib{flex:1;justify-content:center;}
  .side .autosave{width:100%;order:5;}
  .topbar{padding:14px 16px;flex-wrap:wrap;gap:10px;position:static;}
  .topbar h1{font-size:17px;}
  #topActions{width:100%;}
  #topActions .btn{flex:1;}
  .content{padding:16px 14px 50px;}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .kpi-value{font-size:24px;}
  .stats{grid-template-columns:1fr 1fr;}
  /* tablas con scroll horizontal en vez de romper */
  .card{overflow-x:auto;}
  table.grid{min-width:560px;}
  .frow.c2,.frow.c3{grid-template-columns:1fr;}
  .toolbar{flex-direction:column;align-items:stretch;}
  /* vista previa del PDF: que entre escalada */
  .prev-scale{transform-origin:top left;}
  .modal{max-width:100%;}
  .itemline .nums>div:first-child{flex:1 1 100%;min-width:0;}
  .itemline .nums .i-periodo-wrap{flex:1 1 100%;min-width:0;}
}
@media(max-width:420px){
  .kpi-grid{grid-template-columns:1fr;}
  .navbtn{font-size:11.5px;padding:8px 6px;gap:6px;}
  /* sin íconos en pantallas muy chicas: el texto manda */
  .navbtn svg{display:none;}
}

// Cliente REST mínimo (sin librerías externas; usa fetch nativo)
async function sbFetch(path, opts={}, _retry=false){
  // Token de la sesión actual (si el usuario está logueado); si no, cae a la anon key
  let token = SB_KEY;
  try{
    const { data } = await sbClient.auth.getSession();
    if(data && data.session && data.session.access_token){
      token = data.session.access_token;
    }
  }catch(e){ /* sin sesión: usa anon key */ }

  const res = await fetch(SB_REST + path, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...(opts.headers||{})
    }
  });
  if(!res.ok){
    // Token vencido (401/403 con JWT expirado): refresca la sesión y reintenta UNA vez.
    // Esto evita el clásico "falla al primer click, anda al segundo".
    if((res.status===401 || res.status===403) && !_retry){
      try{ await sbClient.auth.refreshSession(); }catch(_){ }
      return sbFetch(path, opts, true);
    }
    const txt = await res.text().catch(()=> '');
    throw new Error('Supabase '+res.status+': '+txt);
  }
  if(res.status===204) return null;
  return res.json();
}

function parseVer(ref){
  const s = String(ref||'');
  // Nuevo formato unificado: "OE-R-0001-02" / "OE-V-4400-02" → último grupo = versión
  let m = /^OE-[RV]-\d+-0*([0-9]+)/i.exec(s);
  if(m) return parseInt(m[1],10);
  // Rental antiguo: "0001 · VER 02"
  m = /VER\s*0*([0-9]+)/i.exec(s);
  if(m) return parseInt(m[1],10);
  // Ventas intermedio: "OE-0001-02"
  m = /^OE-\d+-0*([0-9]+)/i.exec(s);
  if(m) return parseInt(m[1],10);
  return 1;
}
// Construye la referencia homogénea: OE-{R|V}-{nº oferta}-{versión}
//   Rental:  OE-R-0001-01
//   Ventas:  OE-V-4400-01
function refStr(seq, version, unidad){
  const ver = String(version||1).padStart(2,'0');
  const u = (unidad==='ventas') ? 'V' : 'R';
  const nro = (seq!=null) ? String(seq).padStart(4,'0') : '(sin asignar)';
  return `OE-${u}-${nro}-${ver}`;
}

// Retrocompat: si viene texto (cobranzas viejas), lo convierte en una sola línea sin monto.
function parseFormaPago(v){
  if(Array.isArray(v)) return v.map(l=>({concepto:l.concepto||'', monto:l.monto!=null?Number(l.monto):null}));
  if(typeof v==='string' && v.trim()) return [{concepto:v.trim(), monto:null}];
  return [];
}

const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isoToText(iso){
  if(!iso) return '';
  const p=String(iso).split('-'); if(p.length!==3) return iso;
  const y=+p[0], m=+p[1], d=+p[2];
  if(!y||!m||!d) return iso;
  return `${d} de ${MESES[m-1]} de ${y}`;
}

// Devuelve un <th> clickeable que alterna asc/desc sobre el objeto de orden
// (clientSort, quoteSort, etc.) y re-renderiza la vista indicada.
function sortTh(label, col, sortVar, renderCall, cls){
  const sort = window[sortVar];
  const active = sort && sort.col===col;
  const arrow = active ? (sort.dir===1?' ▲':' ▼') : '';
  const cl = cls ? ` class="${cls}"` : '';
  return `<th${cl} class="th-sort${active?' th-active':''}" onclick="toggleSort('${sortVar}','${col}',()=>{${renderCall}()})" title="Ordenar por ${label}">${label}<span class="th-arrow">${arrow}</span></th>`;
}
function toggleSort(sortVar, col, render){
  const s = window[sortVar];
  if(s.col===col) s.dir = -s.dir; else { s.col=col; s.dir=1; }
  if(typeof render==='function') render();
}
// Cliente: TODO EN MAYÚSCULA
function upperName(s){ return String(s==null?'':s).toLocaleUpperCase('es-AR'); }
// Resto de campos: Primera Letra De Cada Palabra En Mayúscula, resto minúscula
function titleCase(s){
  return String(s==null?'':s).toLocaleLowerCase('es-AR')
    // Capitaliza la primera letra de cada palabra. Se separa por límites
    // explícitos (inicio, espacios y signos) en vez de \b, que se comporta
    // mal con caracteres acentuados (á, é, í, ó, ú, ñ) y dejaba letras
    // sueltas en mayúscula en medio de la palabra.
    .replace(/(^|[\s\-/.,'"(])([\p{L}])/gu, (m, sep, ch) => sep + ch.toLocaleUpperCase('es-AR'));
}

// Agrupa cotizaciones por número de oferta (seq). Devuelve grupos ordenados,
// cada uno con su versión más reciente como "principal" y el resto como hijas.
function groupQuotes(list, sortVar){
  const map = new Map();
  list.forEach(q=>{
    const key = (q.seq!=null) ? ('s'+q.seq) : ('id'+q.id); // sin nº asignado: grupo propio
    if(!map.has(key)) map.set(key, []);
    map.get(key).push(q);
  });
  const groups = [];
  map.forEach((versions, key)=>{
    versions.sort((a,b)=>(b.version||parseVer(b.ref)||1)-(a.version||parseVer(a.ref)||1)); // mayor versión primero
    groups.push({ key, seq:versions[0].seq, main:versions[0], versions });
  });
  // orden por columna (sobre la versión principal de cada grupo)
  const s = window[sortVar||'quoteSort'];
  const keyfn = (g)=>{
    const m=g.main;
    switch(s.col){
      case 'ref':      return (m.seq!=null?m.seq:0);
      case 'client':   return (m.client||'').toLowerCase();
      case 'attn':     return (m.attn||'').toLowerCase();
      case 'comercial':return (m.comercial||'').toLowerCase();
      case 'state':    return (stLabel(m.state)||'').toLowerCase();
      case 'total':    return quoteTotal(m)||0;
      case 'fecha':    return Math.max(...g.versions.map(v=>v.created));
      default:         return Math.max(...g.versions.map(v=>v.created));
    }
  };
  groups.sort((a,b)=>{
    const va=keyfn(a), vb=keyfn(b);
    if(va<vb) return -1*s.dir;
    if(va>vb) return  1*s.dir;
    return 0;
  });
  return groups;
}

// Devuelve el HTML de un grupo: fila principal (versión más nueva) + versiones anteriores desplegables
function rowGroup(g){
  const multi = g.versions.length>1;
  const open = openGroups.has(g.key);
  const main = rowQuote(g.main, {multi, open, count:g.versions.length, groupKey:g.key});
  if(!multi) return main;
  const children = g.versions.slice(1).map(v=>rowQuote(v, {child:true, groupKey:g.key, hidden:!open})).join('');
  return main + children;
}

// Alterna el despliegue de un grupo de versiones sin re-renderizar toda la vista
function toggleGroup(key){
  if(openGroups.has(key)) openGroups.delete(key); else openGroups.add(key);
  document.querySelectorAll(`tr.ver-child[data-key="${key}"]`).forEach(tr=>tr.classList.toggle('hide'));
  const mainTr = document.querySelector(`tr.ver-main[data-key="${key}"]`);
  if(mainTr) mainTr.classList.toggle('open');
}

// Número de oferta sin el sufijo de versión (para la fila principal del grupo)
function refBase(x){
  const s = String(x.ref||'');
  // Nuevo formato: "OE-R-0001-02" → base "OE-R-0001"
  let m = /^(OE-[RV]-\d+)-\d+/i.exec(s);
  if(m) return m[1];
  // Formatos viejos que arrancan con dígitos: "0001 · VER 02" → "0001"
  m = /^([0-9]{3,})/.exec(s);
  if(m) return m[1];
  // Ventas intermedio: "OE-0001-02" → "OE-0001"
  m = /^(OE-\d+)-\d+/i.exec(s);
  if(m) return m[1];
  return (x.seq!=null) ? String(x.seq).padStart(4,'0') : esc(x.ref);
}
async function setQuoteState(id, state){

function quoteSubtotal(x){ return (x.items||[]).reduce((a,it)=>a + itemSubtotal(it),0); }
// Monto del descuento según tipo: 'pct' (porcentaje del subtotal) o 'monto' (fijo). Sin descuento => 0.
function quoteDescuento(x){
  const sub = quoteSubtotal(x);
  const v = num(x.descValor);
  if(!v) return 0;
  if(x.descTipo==='pct') return Math.min(sub, sub * v / 100);
  return Math.min(sub, v); // monto fijo, nunca mayor al subtotal
}
function quoteTotal(x){ return quoteSubtotal(x) - quoteDescuento(x); }
function num(s){ return parseFloat(String(s).replace(/[^\d.,-]/g,'').replace(',','.'))||0; }
// --- Período de alquiler en formato MMMAA-MMMAA (ej. JUN26-AGO26) ---
const MESES_ABR=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
// Parsea "JUN26" -> {m:6, y:2026} o null si es inválido.
function parseMesTok(t){
  const mm=String(t||'').trim().toUpperCase().match(/^([A-Z]{3})\s*(\d{2})$/);
  if(!mm) return null;
  const idx=MESES_ABR.indexOf(mm[1]); if(idx<0) return null;
  return { m: idx+1, y: 2000 + parseInt(mm[2],10) };
}
// Devuelve la cantidad de meses (inclusive) de un período "JUN26-AGO26", o null si es inválido.
function mesesDePeriodo(s){
  const parts=String(s||'').trim().toUpperCase().split('-');
  if(parts.length!==2) return null;
  const a=parseMesTok(parts[0]), b=parseMesTok(parts[1]);
  if(!a||!b) return null;
  const diff=(b.y - a.y)*12 + (b.m - a.m);
  if(diff<0) return null;
  return diff + 1;
}
// Normaliza para mostrar: "jun26-ago26" -> "JUN26-AGO26"
function fmtPeriodo(s){
  const parts=String(s||'').trim().toUpperCase().split('-');
  if(parts.length!==2) return String(s||'');
  const a=parseMesTok(parts[0]), b=parseMesTok(parts[1]);
  if(!a||!b) return String(s||'').toUpperCase();
  return `${MESES_ABR[a.m-1]}${String(a.y).slice(-2)}-${MESES_ABR[b.m-1]}${String(b.y).slice(-2)}`;
}
// Cantidad de meses efectiva de un ítem: período (si válido) o plazo numérico, mínimo 1.
function itemMeses(it){
  if(it && it.periodo){ const mp=mesesDePeriodo(it.periodo); if(mp) return mp; }
  return num(it&&it.plazo)||1;
}
// Texto a mostrar en la columna PLAZO del documento.
function itemPlazoTexto(it){
  if(it && it.periodo && mesesDePeriodo(it.periodo)) return fmtPeriodo(it.periodo);
  return esc(it&&it.plazo)||'—';
}
// ¿El ítem tiene algo cargado en la columna plazo/período?
function itemTienePlazo(it){
  return (it && it.periodo && mesesDePeriodo(it.periodo)) || num(it&&it.plazo)>0;
}
// --- Descuento por línea ---
// Importe bruto de una línea (sin descuento de línea): precio × cantidad × meses.
function itemBruto(it){ return num(it&&it.price)*num(it&&it.qty)*itemMeses(it); }
// Monto del descuento de la línea según su tipo ('pct' o 'monto'). 0 si no tiene.
function itemDescMonto(it){
  if(!it) return 0;
  const v = num(it.descValor);
  if(!v) return 0;
  if(it.descTipo==='monto') return Math.min(v, itemBruto(it)); // no descontar más que el bruto
  // por defecto/'pct': porcentaje del bruto, acotado 0–100
  const pct = Math.max(0, Math.min(100, v));
  return itemBruto(it) * pct/100;
}
// Subtotal final de la línea (bruto menos descuento de línea), nunca negativo.
function itemSubtotal(it){ return Math.max(0, itemBruto(it) - itemDescMonto(it)); }
// ¿La línea tiene descuento cargado?
function itemTieneDesc(it){ return num(it&&it.descValor)>0; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    name:val('f_name').trim(), attn:val('f_attn')?val('f_attn').trim():'',
    email:val('f_email').trim(), phone:val('f_phone').trim(), notes:val('f_notes').trim(),
    cuit:val('f_cuit').trim(), portal:val('f_portal').trim(), altaEstado:val('f_alta')||'sin_iniciar', sector:val('f_sector')||'', contactos
  };
  if(!c.name){ toast('Ingresá el nombre del cliente'); return; }
  try{
    if(id){ await SB.updateClient(id, clientToRow(c)); }
    else  { await SB.addClient(clientToRow(c)); }
    await reloadDB();
    closeModal(); toast('Cliente guardado'); go(current);
  }catch(e){ toast('Error al guardar: '+e.message); }
}
async function delClient(id){
  const c = DB.clients.find(x=>x.id===id);
  const nombre = c ? c.name : 'este cliente';
  // Contar registros vinculados (en memoria)
  const nOpps  = DB.opps.filter(o=>o.clientId===id).length;
  const nQuotes= DB.quotes.filter(q=>q.clientId===id).length;
  const nCobr  = (DB.cobranzas||[]).filter(x=>x.clientId===id).length;
  const total  = nOpps + nQuotes + nCobr;

  if(total>0){
    const detalle = [
      nOpps?`${nOpps} oportunidad(es)`:null,
      nQuotes?`${nQuotes} cotización(es)`:null,
      nCobr?`${nCobr} cobranza(s)`:null
    ].filter(Boolean).join(', ');
    if(!confirm(`"${nombre}" tiene ${detalle} asociada(s).\n\nSi continuás, esos registros NO se borran: quedan conservados pero sin cliente vinculado. ¿Seguir?`)) return;
  }
  if(!confirm(`¿Eliminar definitivamente a "${nombre}"? Esta acción no se puede deshacer.`)) return;

  try{
    // Desvincular registros relacionados (no se borran)
    for(const o of DB.opps.filter(o=>o.clientId===id)){
      try{ await SB.updateOpp(o.id, {cliente_id:null}); }catch(_){}
    }
    for(const q of DB.quotes.filter(q=>q.clientId===id)){
      try{ await SB.updateQuote(q.id, {cliente_id:null}); }catch(_){}
    }
    for(const x of (DB.cobranzas||[]).filter(x=>x.clientId===id)){
      try{ await SB.updateCobranza(x.id, {cliente_id:null}); }catch(_){}
    }
    // Mails entrantes y actividades referencian al cliente por FK: desvincular en bloque
    try{ await SB.unlinkMailsCliente(id); }catch(_){}
    try{ await SB.unlinkActsCliente(id); }catch(_){}
    await SB.delClient(id);
    await reloadDB();
    closeModal(); toast('Cliente eliminado'); VIEWS.clients();
  }catch(e){ toast('Error al eliminar: '+e.message); }
}

// Suma montos de una lista separando por moneda. Devuelve string tipo
// "USD 34.000 · $ 120.000" (omite la que esté en cero).
function kanbanSum(list){
  let usd=0, ars=0;
  list.forEach(o=>{ if(o.valor==null) return; if(o.moneda==='ARS') ars+=o.valor; else usd+=o.valor; });
  const parts=[];
  if(usd) parts.push('USD '+fmt(usd));
  if(ars) parts.push('$ '+fmt(ars));
  return parts.length ? parts.join(' · ') : '—';
}

function kanbanCard(o){
  const unCls = o.unidad==='ventas' ? 'v' : 'r';
  const unLbl = o.unidad==='ventas' ? 'Ventas' : 'Rental';

  const det = esc(titleCase(o.tipo)||o.ref||'');
  return `<div class="kanban-card" draggable="true" data-id="${o.id}">
    <div class="kc-cli">${esc(upperName(oppClientName(o)))}</div>
    ${det?`<div class="kc-det">${det}</div>`:''}
    <div class="kc-foot"><span class="kc-un ${unCls}">${unLbl}</span><span class="kc-val">${val}</span></div>
  </div>`;
}

function renderKanban(list){
  ensureKanbanStyles();
  const cols = KANBAN_COLS.map(estado=>{
    const items = list.filter(o=>o.state===estado);
    const cards = items.length ? items.map(kanbanCard).join('') : '<div class="kanban-empty">—</div>';
    return `<div class="kanban-col" data-estado="${estado}">
      <div class="kanban-col-head"><span class="kc-name">${OPP_ESTADO_LBL[estado]||estado}</span><span class="kc-count">${items.length}</span></div>
      <div class="kanban-col-sum">${kanbanSum(items)}</div>
      <div class="kanban-col-body">${cards}</div>
    </div>`;
  }).join('');
  return `<div class="kanban-wrap">${cols}</div>`;
}

// Enlaza drag & drop y click en las tarjetas del Kanban.
function wireKanban(){
  let dragId = null;
  C().querySelectorAll('.kanban-card').forEach(card=>{
    card.addEventListener('dragstart', e=>{ dragId=card.dataset.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    card.addEventListener('dragend', ()=> card.classList.remove('dragging'));
    card.addEventListener('click', ()=> openOpp(card.dataset.id));
  });
  C().querySelectorAll('.kanban-col').forEach(col=>{
    col.addEventListener('dragover', e=>{ e.preventDefault(); col.classList.add('drop-hi'); });
    col.addEventListener('dragleave', ()=> col.classList.remove('drop-hi'));
    col.addEventListener('drop', async e=>{
      e.preventDefault(); col.classList.remove('drop-hi');
      const nuevoEstado = col.dataset.estado;
      const o = DB.opps.find(x=>x.id===dragId); dragId=null;
      if(!o || o.state===nuevoEstado) return;
      try{
        await SB.updateOpp(o.id, { estado: nuevoEstado }); o.state=nuevoEstado;
        toast('Estado actualizado');
        if(nuevoEstado==='ganada'){ await reloadDB(); await crearCobranzaDesdeOpp(o.id); }
        refreshCurrent();
      }catch(err){ toast('Error: '+err.message); }
    });
  });
}

VIEWS.opps = function(){
  setHeader('Oportunidades','Pipeline comercial',
    `<button class="btn" onclick="newOpp()">${ICO.plus} Nueva oportunidad</button>`);

  let list = [...DB.opps].filter(o=> !o.cotizacionId);  // las convertidas viven como cotización
  if(oppFilters.unidad)    list = list.filter(o=>o.unidad===oppFilters.unidad);
  if(oppFilters.estado)    list = list.filter(o=>o.state===oppFilters.estado);
  else                     list = list.filter(o=>o.state!=='desestimada');
  if(oppFilters.prioridad) list = list.filter(o=>o.prioridad===oppFilters.prioridad);

  const og = (o,col)=>{
    switch(col){
      case 'ref':     return (o.ref||'').toLowerCase();
      case 'client':  return oppClientName(o).toLowerCase();
      case 'tipo':    return (o.tipo||'').toLowerCase();
      case 'prio':    return OPP_PRIOS.indexOf(o.prioridad);
      case 'estado':  return OPP_ESTADOS.indexOf(o.state);
      case 'fecha':   return o.fechaLimite||'';
      case 'valor':   return o.valor!=null?o.valor:-1;
      default:        return o.created;
    }
  };
  list.sort((a,b)=>{
    const va=og(a,oppSort.col), vb=og(b,oppSort.col);
    if(va<vb) return -1*oppSort.dir;
    if(va>vb) return  1*oppSort.dir;
    return 0;
  });

  const optSel = (cur, pairs)=> pairs.map(([v,l])=>`<option value="${v}" ${v===cur?'selected':''}>${l}</option>`).join('');

  const vistaToggle = `<div class="vista-toggle">
      <button class="${oppVista==='tabla'?'on':''}" onclick="setOppVista('tabla')">Tabla</button>
      <button class="${oppVista==='kanban'?'on':''}" onclick="setOppVista('kanban')">Kanban</button>
    </div>`;

  // En Kanban el estado se representa por columna, así que ocultamos ese filtro.
  const filtroEstado = oppVista==='kanban' ? '' : `
      <select id="fEstado">
        <option value="">Todos los estados</option>
        ${optSel(oppFilters.estado, OPP_ESTADOS.map(s=>[s,OPP_ESTADO_LBL[s]]))}
      </select>`;

  const cuerpo = oppVista==='kanban'
    ? (list.length ? renderKanban(list)
        : `<div class="empty" style="padding:40px">No hay oportunidades${oppFilters.unidad||oppFilters.prioridad?' con estos filtros':''}.</div>`)
    : `<div class="card"><div class="card-b" style="padding:0">
        ${list.length ? `<table class="grid">
          <thead><tr>
            ${sortTh('Ref.','ref','oppSort','VIEWS.opps')}
            ${sortTh('Cliente / Organismo','client','oppSort','VIEWS.opps')}
            ${sortTh('Tipo','tipo','oppSort','VIEWS.opps')}
            ${sortTh('Prioridad','prio','oppSort','VIEWS.opps')}
            ${sortTh('Estado','estado','oppSort','VIEWS.opps')}
            ${sortTh('Fecha límite','fecha','oppSort','VIEWS.opps')}
            ${sortTh('Valor','valor','oppSort','VIEWS.opps','r')}
          </tr></thead>
          <tbody>${list.map(rowOpp).join('')}</tbody></table>`
        : `<div class="empty" style="padding:40px">No hay oportunidades${oppFilters.unidad||oppFilters.estado||oppFilters.prioridad?' con estos filtros':''}. Llegan automáticamente desde los mails, o podés crear una con “Nueva oportunidad”.</div>`}
      </div></div>`;

  C().innerHTML = `
    <div class="opp-filters">
      <select id="fUnidad">
        <option value="">Todas las unidades</option>
        ${optSel(oppFilters.unidad, [['rental','Rental'],['ventas','Ventas']])}
      </select>
      ${filtroEstado}
      <select id="fPrio">
        <option value="">Todas las prioridades</option>
        ${optSel(oppFilters.prioridad, OPP_PRIOS.map(p=>[p,OPP_PRIO_LBL[p]]))}
      </select>
      <span class="help" style="margin-left:auto;display:flex;align-items:center;gap:12px">${vistaToggle}<span>${list.length} oportunidad${list.length===1?'':'es'}</span></span>
    </div>
    ${cuerpo}`;

  document.getElementById('fUnidad').onchange=e=>{ oppFilters.unidad=e.target.value; VIEWS.opps(); };
  { const fe=document.getElementById('fEstado'); if(fe) fe.onchange=e=>{ oppFilters.estado=e.target.value; VIEWS.opps(); }; }
  document.getElementById('fPrio').onchange=e=>{ oppFilters.prioridad=e.target.value; VIEWS.opps(); };
  if(oppVista==='kanban') wireKanban();
  else C().querySelectorAll('tr.clickable').forEach(tr=> tr.onclick=()=> openOpp(tr.dataset.id));
};

function rowOpp(o){
  const unidadTag = o.unidad==='ventas' ? '<span class="help" style="font-size:10px"> · Ventas</span>' : '';
  const valor = o.valor!=null ? `${o.moneda==='ARS'?'$':'USD'} ${fmt(o.valor)}` : '—';

    ppChip = `<span title="${esc(o.proximoPaso)}" style="display:inline-block;margin-left:6px;width:7px;height:7px;border-radius:50%;background:${color};vertical-align:middle"></span>`;
  }
  return `<tr class="clickable" data-id="${o.id}">

    <td>${esc(upperName(oppClientName(o)))}</td>

    <td><span class="badge pr-${o.prioridad}">${OPP_PRIO_LBL[o.prioridad]||o.prioridad}</span></td>
    <td><span class="badge os-${o.state}">${OPP_ESTADO_LBL[o.state]||o.state}</span></td>
    <td>${fmtFecha(o.fechaLimite)}${ppChip}</td>
    <td class="r">${valor}</td>
  </tr>`;
}

/* ================= AUDIT TRAIL (historial de cambios) ================= */
// Lee la tabla audit_log que llenan los triggers de Supabase. Sólo lectura.
const AUDIT_TABLA_LBL = { oportunidades:'Oportunidad', cotizaciones:'Cotización', pedidos:'Pedido', facturas:'Factura' };
const AUDIT_OP_LBL = { INSERT:'Creado', UPDATE:'Modificado', DELETE:'Eliminado' };

// Resuelve, a partir de la tabla + id del log, un nombre legible del registro
// y una función para abrirlo (si la app sabe cómo). Usa la data en memoria.
function auditRegistroInfo(tabla, regId){
  if(tabla==='oportunidades'){
    const o = DB.opps.find(x=>x.id===regId);
    if(o) return { nombre:(o.ref?o.ref+' · ':'')+oppClientName(o), abrir:`openOpp('${regId}')` };
  }
  if(tabla==='cotizaciones'){
    const q = DB.quotes.find(x=>x.id===regId);
    if(q){ const cli = q.clientId ? (DB.clients.find(c=>c.id===q.clientId)||{}).name : (q.client||'');
      return { nombre:(q.ref?q.ref+(cli?' · '+cli:''):regId), abrir:`editQuote('${regId}')` }; }
  }
  if(tabla==='facturas'){
    const f = (DB.cobranzas||[]).find(x=>x.id===regId);
    if(f) return { nombre:(f.ref||f.factura||regId), abrir:null };
  }
  // sin match (registro borrado, o tabla sin data en memoria)
  return { nombre:'#'+String(regId).slice(0,8), abrir:null };
}

// Convierte el diff (jsonb con {campo:{old,new}}) en filas legibles.
function auditDiffText(row){
  const d = row.diff || row.cambios || null;
  if(!d) return '';
  let obj = d; if(typeof d==='string'){ try{ obj=JSON.parse(d); }catch(e){ return ''; } }
  const campos = Object.keys(obj||{});
  if(!campos.length) return '';
  return campos.map(c=>{
    const v = obj[c] || {};
    const o = (v.old==null||v.old==='')?'—':esc(String(v.old));
    const n = (v.new==null||v.new==='')?'—':esc(String(v.new));
    return `<span class="help" style="font-size:11px"><code style="background:#f0efe6;padding:1px 5px;border-radius:4px">${esc(c)}</code> <span style="color:#a3573d;text-decoration:line-through">${o}</span> → <span style="color:#5f7a4e;font-weight:600">${n}</span></span>`;
  }).join('<br>');
}
// clickable=true agrega la columna Registro con enlace (para la vista global).
function auditRowHtml(row, clickable){
  const fecha = row.cambiado_en ? new Date(row.cambiado_en).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
  const tabla = AUDIT_TABLA_LBL[row.tabla]||row.tabla;
  const op = AUDIT_OP_LBL[row.operacion]||row.operacion;
  const usuario = row.usuario || row.usuario_email || '—';
  const diff = auditDiffText(row);
  let regCell = '';
  if(clickable){
    const info = auditRegistroInfo(row.tabla, row.registro_id);
    const link = info.abrir
      ? `<a href="#" onclick="closeModal&&closeModal();${info.abrir};return false" style="color:#5f7a4e;font-weight:600;text-decoration:none">${esc(info.nombre)} ↗</a>`
      : `<span style="color:#37432c">${esc(info.nombre)}</span>`;
    regCell = `<td style="font-size:12px">${esc(tabla)}<br>${link}</td>`;
  }
  return `<tr>
    <td style="white-space:nowrap;font-size:12px">${fecha}</td>
    <td style="font-size:12px;color:var(--muted)">${esc(usuario)}</td>
    ${clickable ? regCell : `<td style="font-size:12px">${esc(tabla)} · ${op}</td>`}
    <td style="font-size:12px">${op}</td>
    <td>${diff||'<span class="help" style="font-size:11px">—</span>'}</td>
  </tr>`;
}

// Convierte array de líneas {concepto,monto} <-> texto editable (una línea por concepto)
function formaPagoToText(fp){
  const arr = parseFormaPago(fp);
  return arr.map(l=> l.monto!=null ? `${l.concepto} = ${l.monto}` : (l.concepto||'')).join('\n');
}
function textToFormaPago(txt){
  return (txt||'').split('\n').map(s=>s.trim()).filter(Boolean).map(line=>{
    const i = line.lastIndexOf('=');
    if(i>=0){
      const concepto = line.slice(0,i).trim();
      const montoRaw = line.slice(i+1).trim();
      const monto = montoRaw==='' ? null : num(montoRaw);
      return {concepto: concepto||line, monto: isNaN(monto)?null:monto};
    }
    return {concepto: line, monto: null};
  });
}

// Al ganar una oportunidad: crear el registro de cobranza para facturación.
// Idempotente: si ya existe una cobranza para esa oportunidad, no la duplica.
// Trae monto y forma de pago de la cotización vinculada (editable luego por facturación).
async function crearCobranzaDesdeOpp(oppId){
  try{
    const o = DB.opps.find(x=>x.id===oppId); if(!o) return;
    const cli = o.clientId ? DB.clients.find(c=>c.id===o.clientId) : null;
    const cot = o.cotizacionId ? DB.quotes.find(q=>q.id===o.cotizacionId) : null;
    const montoBase  = cot ? quoteTotal(cot) : (o.valor!=null?o.valor:0);
    const moneda     = cot ? (cot.currency||'USD') : (o.moneda||'USD');
    // Forma de pago: prioridad a la cargada en la oportunidad; si no, la de la cotización (texto).
    const formaPago  = (o.formaPago && o.formaPago.length) ? o.formaPago
                       : ((cot && cot.pago) ? [{concepto:cot.pago, monto:null}] : []);
    const unidad     = o.unidad||'rental';
    const yaExiste = DB.cobranzas.some(c=> c.oppId===oppId);
    if(!yaExiste){
      await SB.addCobranza(cobranzaToRow({
        ref: o.ref||'', oppId: o.id, clientId: o.clientId||'',
        razonSocial: cli ? cli.name : oppClientName(o),
        cuit: cli ? (cli.cuit||'') : '',
        montoBase, moneda, formaPago, estado:'pendiente', unidad,
        notas: cot ? 'Generada al ganar la venta. Datos tomados de la cotización vinculada.' : 'Generada al ganar la venta. Completar monto y forma de pago.'
      }));
      toast('Venta enviada a Cobranzas');
    }
    // Aviso a Facturación (Teams + mail). Se manda siempre al ganar, exista o no la cobranza.
    notificarCobranza({
      ref: o.ref||'',
      razon_social: cli ? cli.name : oppClientName(o),
      cuit: cli ? (cli.cuit||'') : '',
      monto_total: montoBase,
      moneda,
      forma_pago: (cot && cot.pago) ? cot.pago : '(a completar por Facturación)',
      comercial: o.comercial||'',
      unidad: o.unidad||''
    });
  }catch(e){ /* si la tabla no existe aún, no rompe el flujo */ console.warn('Cobranza:', e.message); }
}

// Al marcar una COTIZACIÓN de rental como ganada: crear la cobranza desde la cotización.
// Evita duplicar si ya hay cobranza para esta cotización o para su oportunidad vinculada.
async function crearCobranzaDesdeQuote(quoteId){
  try{
    const q = DB.quotes.find(x=>x.id===quoteId); if(!q) return;
    const cli = q.clientId ? DB.clients.find(c=>c.id===q.clientId) : null;
    // Oportunidad vinculada (si esta cotización nació de una)
    const opp = DB.opps.find(o=>o.cotizacionId===quoteId);
    // Dedup: ya existe cobranza para esta cotización (por su opp) o registrada con su ref
    const yaExiste = (opp && DB.cobranzas.some(c=>c.oppId===opp.id))
                   || DB.cobranzas.some(c=> c.ref===q.ref);
    const montoBase = quoteTotal(q);
    const moneda    = q.currency||'USD';
    const formaPago = q.pago ? [{concepto:q.pago, monto:null}] : [];

// y mail (vía Edge Function notificar-cobranza). Silencioso: nunca interrumpe el flujo de la app.
async function notificarCobranza(payload){
  const sym = (payload.moneda==='ARS') ? '$' : 'USD';
  let okTeams = false, okMail = false;
  // 1) Teams: POST a la URL firmada del Workflow, formato Adaptive Card.
  if(COBRANZA_WEBHOOK_URL){
    const facts = [
      {title:'Ref:', value: payload.ref||'—'},
      {title:'Cliente:', value: (payload.razon_social||'—')+(payload.cuit?` (CUIT ${payload.cuit})`:'')},
      {title:'Monto:', value: `${sym} ${Number(payload.monto_total||0).toLocaleString('es-AR')}`},
      {title:'Forma de pago:', value: payload.forma_pago||'—'}
    ];
    if(payload.comercial) facts.push({title:'Comercial:', value: payload.comercial});
    if(payload.unidad)    facts.push({title:'Unidad:', value: payload.unidad});
    const card = {
      type:'message',
      attachments:[{
        contentType:'application/vnd.microsoft.card.adaptive',
        content:{
          $schema:'http://adaptivecards.io/schemas/adaptive-card.json',
          type:'AdaptiveCard',
          version:'1.4',
          body:[
            {type:'TextBlock', size:'Medium', weight:'Bolder', text:'💰 Nueva venta ganada — pasa a Cobranzas', wrap:true},
            {type:'FactSet', facts: facts}
          ]
        }
      }]
    };
    try{
      const r = await fetch(COBRANZA_WEBHOOK_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(card)
      });
      okTeams = r.ok || r.status===202;
      if(!okTeams) console.warn('Teams respondió', r.status);
    }catch(e){ console.warn('Aviso Teams no enviado:', e.message); }
  }
  // 2) Mail: vía Edge Function (server-side, Microsoft Graph).
  try{
    const r = await fetch(SB_URL + '/functions/v1/notificar-cobranza', {
      method:'POST',
      headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+SB_KEY},
      body: JSON.stringify(payload)
    });
    okMail = r.ok;
    if(!okMail){ const t=await r.text().catch(()=> ''); console.warn('Mail Edge Function respondió', r.status, t); }
  }catch(e){ console.warn('Aviso mail no enviado:', e.message); }
  // Feedback visible
  if(okTeams && okMail)      toast('Aviso a Facturación enviado (Teams + mail)');
  else if(okTeams)          toast('Aviso enviado a Teams (mail falló — ver consola)');
  else if(okMail)           toast('Mail enviado a Facturación (Teams falló — ver consola)');
  else                      toast('No se pudo enviar el aviso — ver consola (F12)');
}

function startOfMonthTs(){ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),1).getTime(); }
function ventasKPIs(){
  const v = DB.opps.filter(o=> o.unidad==='ventas' || o.unidad==='ambas');
  const tm = startOfMonthTs();
  const t0 = startOfToday();
  const nuevasHoy = v.filter(o=> o.created && o.created>=t0).length;
  const enProceso = v.filter(o=> o.state==='nuevo' || o.state==='borrador').length;
  const cotizadas = v.filter(o=> o.state==='enviada').length;           // a la espera de respuesta
  const ganadasMes = v.filter(o=> o.state==='ganada' && (o.updated||o.created)>=tm).length;
  // cotizadas en el mes: las que llegaron a estado cotizado o más avanzado este mes
  const cotizadasMes = v.filter(o=> ['enviada','negociacion','ganada','perdida'].includes(o.state) && (o.updated||o.created)>=tm).length;
  const pipeline = v.filter(o=> o.state!=='perdida' && o.state!=='ganada' && o.state!=='desestimada')
                    .reduce((s,o)=> s + (o.valor||0), 0);
  const cerradas = v.filter(o=> o.state==='ganada' || o.state==='perdida').length;
  const conv = cerradas>0 ? Math.round(100*v.filter(o=>o.state==='ganada').length/cerradas) : 0;
  return { total:v.length, nuevasHoy, enProceso, cotizadas, cotizadasMes, ganadasMes, pipeline, conv };
}

// ---- Indicadores de prospección ----
function startOfToday(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function startOfYesterday(){ return startOfToday() - 86400000; }
function startOfWeek(){ const d=new Date(); d.setHours(0,0,0,0); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow); return d.getTime(); }
function startOfMonth(){ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),1).getTime(); }

function prospGestiones(){ return DB.acts.filter(a=> a.descripcion && a.descripcion.includes('[prospecto:')); }

// Cuenta gestiones de prospección por comercial (para el gráfico "quién contacta")
function prospPorComercial(){
  const counts = {};
  prospGestiones().forEach(a=>{ const c = (a.comercial||'').trim() || 'Sin asignar'; counts[c]=(counts[c]||0)+1; });
  return Object.entries(counts).sort((a,b)=> b[1]-a[1]);
}

function prospKPIs(){
  const g = prospGestiones();
  const t0=startOfToday(), ty=startOfYesterday(), tw=startOfWeek(), tm=startOfMonth();
  const hoy = g.filter(a=> a.fecha>=t0).length;
  const ayer = g.filter(a=> a.fecha>=ty && a.fecha<t0).length;
  const semana = g.filter(a=> a.fecha>=tw).length;
  // por estado actual + fecha de cambio aproximada (no rastreamos histórico fino aquí)
  const enConv = DB.prospectos.filter(p=> p.estado==='en_conversacion').length;
  const convMes = DB.prospectos.filter(p=> p.estado==='calificado' && p.oppId).length;
  return { hoy, ayer, semana, enConv, convMes };
}

function kpiCard(label, value, target, sub, opts){
  opts = opts || {};
  const valStr = opts.pct ? value+'%' : value;
  const clickable = opts.onclick ? `onclick="${opts.onclick}" style="cursor:pointer"` : 'style="cursor:default"';
  const activeCls = opts.active ? ' kpi-active' : '';
  // Sin objetivo (target 0): tarjeta informativa, sin barra ni color
  if(!target){
    return `<div class="kpi kpi-prog${activeCls}" ${clickable}>
      <div class="kpi-label">${label}</div>
      <div class="kpi-prog-num"><span class="kpi-prog-val" style="color:var(--ink)">${valStr}</span></div>
      ${sub?`<div class="kpi-sub" style="margin-top:7px">${sub}</div>`:''}
    </div>`;
  }
  const ok = value>=target;
  const color = ok ? '#639922' : '#e24b4a';
  const pct = Math.min(100, Math.round(100*value/target));
  const tgtStr = opts.pct ? target+'%' : target;
  return `<div class="kpi kpi-prog${activeCls}" ${clickable}>
    <div class="kpi-label">${label}</div>
    <div class="kpi-prog-num">
      <span class="kpi-prog-val" style="color:${color}">${valStr}</span>
      <span class="kpi-prog-tgt">/ ${tgtStr}</span>
    </div>
    <div class="kpi-prog-bar"><div class="kpi-prog-fill" style="width:${pct}%;background:${color}"></div></div>
    ${sub?`<div class="kpi-sub" style="margin-top:7px">${sub}</div>`:''}
  </div>`;
}

function renderEmpresas(){
  const q = prospView.search.toLowerCase();
  let emps = [...DB.empProsp];
  const byEmp = {};
  DB.prospectos.forEach(p=>{ (byEmp[p.empresaId] = byEmp[p.empresaId] || []).push(p); });
  // sectores disponibles: lista unificada + cualquier valor heredado en datos
  const sectoresData = [...new Set(DB.empProsp.map(e=>e.sector).filter(Boolean))];
  const sectores = [...SECTORES, ...sectoresData.filter(s=>!SECTORES.includes(s))];
  if(prospView.sector) emps = emps.filter(e=> e.sector===prospView.sector);
  if(q) emps = emps.filter(e=> e.nombre.toLowerCase().includes(q));
  // filtro por estado: empresas que tengan al menos un prospecto en ese estado
  const fe = prospView.filtroEstadoEmp;
  if(fe) emps = emps.filter(e=> (byEmp[e.id]||[]).some(p=>p.estado===fe));
  emps.sort((a,b)=> (byEmp[b.id]?.length||0) - (byEmp[a.id]?.length||0) || a.nombre.localeCompare(b.nombre));

  const totalProsp = DB.prospectos.length;
  const k = prospKPIs();

  // Conteo de prospectos por estado (para KPIs clickeables)
  const estadoCounts = {};
  DB.prospectos.forEach(p=> estadoCounts[p.estado]=(estadoCounts[p.estado]||0)+1);

  // Gráfico "quién contacta": gestiones por comercial
  const porCom = prospPorComercial();
  const maxCom = porCom.length ? porCom[0][1] : 0;
  const chart = porCom.length
    ? porCom.map(([name,n])=>{
        const pct = maxCom? Math.round(100*n/maxCom) : 0;
        return `<div class="qc-row">
          <div class="qc-name">${esc(name)}</div>
          <div class="qc-track"><div class="qc-fill" style="width:${pct}%"></div></div>
          <div class="qc-val">${n}</div>
        </div>`;
